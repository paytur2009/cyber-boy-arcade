<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Cyber-Boy 2026: Cross-Platform Edition</title>
    <style>
        /* CSS ЗМІННІ ДЛЯ СКІНІВ */
        :root {
            --bg-body: radial-gradient(circle at center, #1f1235 0%, #090514 100%);
            --bg-cabinet: linear-gradient(135deg, #2d2640 0%, #171226 100%);
            --border-cabinet: #4d3b6e;
            --screen-border: #0b0813;
            --canvas-bg: #0a0710;
            --text-color: #fff;
            --primary-neon: #0DC2FF;
            --secondary-neon: #FF0D72;
            --accent-neon: #0DFF72;
            --text-glow: 0 0 5px rgba(13, 194, 255, 0.5);
        }

        /* КЛАСИЧНИЙ GAME BOY 1989 РОКУ */
        [data-theme="classic"] {
            --bg-body: radial-gradient(circle at center, #555 0%, #222 100%);
            --bg-cabinet: linear-gradient(135deg, #cfcfcf 0%, #a6a6a6 100%);
            --border-cabinet: #7f7f7f;
            --screen-border: #5a6354;
            --canvas-bg: #8b966c;
            --text-color: #0f380f;
            --primary-neon: #306230;
            --secondary-neon: #0f380f;
            --accent-neon: #306230;
            --text-glow: none;
        }

        /* ХАКЕРСЬКА МАТРИЦЯ */
        [data-theme="matrix"] {
            --bg-body: #000;
            --bg-cabinet: linear-gradient(135deg, #051a05 0%, #000200 100%);
            --border-cabinet: #0f520f;
            --screen-border: #020a02;
            --canvas-bg: #000;
            --text-color: #00ff00;
            --primary-neon: #00ff00;
            --secondary-neon: #008800;
            --accent-neon: #00ff00;
            --text-glow: 0 0 8px #00ff00;
        }

        body {
            background: var(--bg-body);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            overflow-y: auto;
            text-shadow: var(--text-glow);
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        #game-title-text {
            font-size: 22px;
            color: var(--primary-neon);
            margin-bottom: 6px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 3px;
            text-align: center;
            flex-shrink: 0;
        }

        .scores-container {
            display: flex;
            justify-content: space-between;
            width: 260px;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 13px;
            color: var(--accent-neon);
            flex-shrink: 0;
        }

        #best-score {
            color: #FFE138;
        }

        .arcade-cabinet {
            background: var(--bg-cabinet);
            border: 4px solid var(--border-cabinet);
            border-radius: 20px 20px 40px 20px;
            padding: 15px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 250px;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .game-container {
            position: relative;
            width: 216px;
            height: 320px;
            border-radius: 8px;
            overflow: hidden;
            border: 4px solid var(--screen-border);
            background-color: var(--canvas-bg);
        }

        canvas {
            display: block;
            width: 216px;
            height: 320px;
            /* Налаштування для супер-чітких ретро пікселів */
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .game-container::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            z-index: 10;
            pointer-events: none;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 6, 22, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            padding: 10px;
            z-index: 5;
        }
        
        [data-theme="classic"] .overlay {
            background: var(--canvas-bg);
        }

        .hidden { display: none !important; }

        h1 {
            font-size: 15px; margin-top: 0; margin-bottom: 8px;
            color: var(--secondary-neon); text-transform: uppercase; text-align: center;
        }

        h2 { font-size: 15px; color: var(--secondary-neon); margin: 0 0 8px 0; }

        .top-bar {
            display: flex; gap: 4px; margin-bottom: 8px; justify-content: center; width: 100%;
        }

        .lang-btn {
            font-size: 10px; padding: 3px 6px;
            border: 1px solid var(--border-cabinet);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color); cursor: pointer; border-radius: 4px;
            touch-action: manipulation;
        }

        .lang-btn.active {
            color: var(--primary-neon); border-color: var(--primary-neon);
        }

        .nickname-section { width: 100%; margin-bottom: 6px; text-align: center; }
        .nickname-section label { font-size: 8px; color: var(--text-color); display: block; margin-bottom: 2px; }
        
        input[type="text"] {
            width: 85%; padding: 4px; background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--border-cabinet); color: var(--accent-neon);
            font-family: 'Courier New', Courier, monospace; font-size: 11px;
            text-align: center; border-radius: 4px; text-transform: uppercase;
        }

        button.menu-game-btn {
            padding: 5px 6px; font-size: 10px; font-family: 'Courier New', Courier, monospace;
            font-weight: bold; color: var(--text-color); background: rgba(0, 0, 0, 0.4);
            border-radius: 4px; cursor: pointer; text-transform: uppercase;
            width: 100%; margin-bottom: 3px; border: 1px solid var(--primary-neon);
            touch-action: manipulation;
        }

        /* ГЕЙМПАД GAME BOY */
        .gb-control-pad {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; margin-top: 20px; padding: 0 5px; box-sizing: border-box;
        }

        .d-pad {
            display: grid; grid-template-columns: repeat(3, 28px); grid-template-rows: repeat(3, 28px);
        }

        .d-pad-btn {
            background: #1a1525; border: 2px solid #110d1a; color: #52436e;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold; cursor: pointer;
            touch-action: none;
        }
        [data-theme="classic"] .d-pad-btn { background: #222; border-color: #000; color: #555; }

        #touch-up { grid-column: 2; grid-row: 1; border-radius: 6px 6px 0 0; }
        #touch-left { grid-column: 1; grid-row: 2; border-radius: 6px 0 0 6px; }
        .d-pad-center { grid-column: 2; grid-row: 2; background: #1a1525; border: none; }
        [data-theme="classic"] .d-pad-center { background: #222; }
        #touch-right { grid-column: 3; grid-row: 2; border-radius: 0 6px 6px 0; }
        #touch-down { grid-column: 2; grid-row: 3; border-radius: 0 0 6px 6px; }

        .d-pad-btn:active { background: var(--primary-neon); color: #000; }

        .gb-buttons { display: flex; gap: 12px; transform: rotate(-15deg); }

        .gb-btn {
            width: 38px; height: 38px; border-radius: 50%;
            background: #bc1e5c; border: 3px solid #6e0f34;
            color: #fff; font-weight: bold; font-size: 15px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 0 #42051c; cursor: pointer;
            touch-action: none;
        }
        [data-theme="classic"] .gb-btn { background: #8b1e0f; border-color: #380700; box-shadow: 0 4px 0 #200000; }

        .gb-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #42051c; }

        .system-controls { display: flex; justify-content: center; width: 100%; margin-top: 15px; }

        .btn-system {
            background: #524763; border: 1px solid #352d42; color: #171226;
            font-weight: bold; padding: 5px 22px; border-radius: 15px;
            font-size: 9px; letter-spacing: 1px; transform: rotate(-10deg);
            box-shadow: 0 3px 0 #211c2b; cursor: pointer;
            touch-action: none;
        }

        .btn-system:active { transform: rotate(-10deg) translateY(2px); box-shadow: 0 1px 0 #211c2b; color: #fff; }

        .controls-info { margin-top: 10px; font-size: 10px; color: #6c5c8a; text-align: center; text-transform: uppercase; }
        
        .loading-bar-container {
            width: 80%; height: 10px; border: 1px solid var(--primary-neon); margin-top: 15px; position: relative;
        }
        .loading-bar {
            width: 0%; height: 100%; background: var(--accent-neon); animation: loadProgress 1s linear forwards;
        }
        @keyframes loadProgress { 0% { width: 0%; } 100% { width: 100%; } }
    </style>
</head>
<body data-theme="cyber">

    <div id="game-title-text">CYBER BOY</div>
    
    <div class="scores-container">
        <div id="score">SCORE: 0</div>
        <div id="best-score">BEST: 0 (NONE)</div>
    </div>

    <div class="arcade-cabinet">
        <div class="game-container">
            <canvas id="gameCanvas" width="216" height="320"></canvas>

            <!-- Головне меню -->
            <div id="start-menu" class="overlay">
                <div class="top-bar">
                    <button class="lang-btn" id="lang-uk" onclick="changeLanguage('uk')">UA</button>
                    <button class="lang-btn" id="lang-en" onclick="changeLanguage('en')">EN</button>
                    <button class="lang-btn" id="btn-theme" onclick="cycleTheme()">🎨</button>
                    <button class="lang-btn" id="btn-mute" onclick="toggleMute()">🔊</button>
                </div>

                <h1 id="tx-select-module">SELECT MODULE</h1>
                
                <div class="nickname-section">
                    <label id="tx-username-label" for="username">> ВВЕДІТЬ ІДЕНТИФІКАТОР:</label>
                    <input type="text" id="username" maxlength="10" value="PLAYER 1">
                </div>

                <button class="menu-game-btn" onclick="bootGame('tetris')">1. TETRIS</button>
                <button class="menu-game-btn" onclick="bootGame('snake')">2. SNAKE</button>
                <button class="menu-game-btn" onclick="bootGame('pong')">3. PONG TENNIS</button>
                <button class="menu-game-btn" onclick="bootGame('brick')">4. ARKANOID</button>
                <button class="menu-game-btn" onclick="bootGame('ttt')">5. TIC-TAC-TOE</button>
                <button class="menu-game-btn" style="border-color:#ff8e0d; color:#ff8e0d" onclick="bootGame('invaders')">6. SPACE INVADERS</button>
            </div>

            <!-- Екран завантаження BIOS -->
            <div id="boot-screen" class="overlay hidden">
                <div style="font-size: 11px; text-align: left; width: 85%; line-height: 1.5;" id="boot-log">
                    CYBER-BOY BIOS v2.6<br>
                    CHECKING RAM... OK<br>
                    MOUNTING CARTRIDGE...
                </div>
                <div class="loading-bar-container"><div class="loading-bar"></div></div>
            </div>

            <!-- Меню Паузи -->
            <div id="pause-menu" class="overlay hidden">
                <h1 id="tx-paused">PAUSED</h1>
                <button class="menu-game-btn" style="border-color:#fff" id="tx-resume" onclick="togglePause()">RESUME</button>
                <button class="menu-game-btn" style="border-color:#555; color:#888" id="tx-quit" onclick="showStartMenu()">QUIT</button>
            </div>

            <!-- Меню Програшу -->
            <div id="game-over-menu" class="overlay hidden">
                <h2 id="over-title">SYSTEM FAILURE</h2>
                <div id="final-score" style="margin-bottom: 12px; font-size: 11px; font-weight: bold;">SCORE: 0</div>
                <button class="menu-game-btn" style="border-color:#fff" id="tx-again" onclick="restartCurrentGame()">TRY AGAIN</button>
                <button class="menu-game-btn" style="border-color:#555; color:#888" id="tx-main-menu" onclick="showStartMenu()">MAIN MENU</button>
            </div>
        </div>

        <!-- ОРГАНІКА КЕРУВАННЯ GAME BOY -->
        <div class="gb-control-pad">
            <div class="d-pad">
                <div class="d-pad-btn" id="touch-up">▲</div>
                <div class="d-pad-btn" id="touch-left">◀</div>
                <div class="d-pad-center"></div>
                <div class="d-pad-btn" id="touch-right">▶</div>
                <div class="d-pad-btn" id="touch-down">▼</div>
            </div>
            <div class="gb-buttons">
                <div class="gb-btn" id="touch-b">B</div>
                <div class="gb-btn" id="touch-a">A</div>
            </div>
        </div>

        <div class="system-controls">
            <button class="btn-system" id="touch-pause">START / PAUSE</button>
        </div>
    </div>

    <div class="controls-info" id="control-help">Керування кнопками геймпада або стрілками клавіатури</div>

<script>
const safeStorage = {
    getItem: function(key) { try { return localStorage.getItem(key); } catch(e) { return null; } },
    setItem: function(key, val) { try { localStorage.setItem(key, val); return true; } catch(e) { return false; } }
};

const i18n = {
    uk: {
        consoleTitle: "CYBER BOY", selectModule: "ОБЕРИ МОДУЛЬ", usernameLabel: "> ІДЕНТИФІКАТОР КОРИСТУВАЧА:",
        paused: "ПАУЗА", resume: "ПРОДОВЖИТИ", quit: "В МЕНЮ", failure: "СИСТЕМНИЙ ЗБІЙ", again: "ЗНОВУ",
        mainMenu: "ГОЛОВНЕ МЕНЮ", scoreStr: "РАХУНОК: ", bestStr: "РЕКОРД: ", resultStr: ", РЕЗУЛЬТАТ: ",
        victory: "ПЕРЕМОГА!", draw: "НІЧИЯ!", youWin: "ТИ ВИГРАВ!", cpuWins: "РОБОТ ВИГРАВ!", matchOver: "МАТЧ ЗАВЕРШЕНО"
    },
    en: {
        consoleTitle: "CYBER BOY", selectModule: "SELECT MODULE", usernameLabel: "> USER IDENTIFIER:",
        paused: "PAUSED", resume: "RESUME", quit: "QUIT TO MENU", failure: "SYSTEM FAILURE", again: "TRY AGAIN",
        mainMenu: "MAIN MENU", scoreStr: "SCORE: ", bestStr: "BEST: ", resultStr: ", RESULT: ",
        victory: "VICTORY!", draw: "DRAW!", youWin: "YOU WIN!", cpuWins: "CPU WINS!", matchOver: "MATCH OVER"
    }
};

let currentLang = safeStorage.getItem('arcade_lang') || 'uk';
let isMuted = safeStorage.getItem('arcade_muted') === 'true';
let activeTheme = safeStorage.getItem('arcade_theme') || 'cyber';

const canvas = document.getElementById('gameCanvas');
const context = canvas.getContext('2d');
context.scale(18, 16); 

const startMenu = document.getElementById('start-menu');
const bootScreen = document.getElementById('boot-screen');
const pauseMenu = document.getElementById('pause-menu');
const gameOverMenu = document.getElementById('game-over-menu');
const finalScoreText = document.getElementById('final-score');
const gameTitleText = document.getElementById('game-title-text');
const usernameInput = document.getElementById('username');
const muteBtn = document.getElementById('btn-mute');

let currentGame = ''; let isPaused = false; let isPlaying = false; let score = 0; let lastTime = 0;
let currentPlayerName = "PLAYER 1";

let bgmTimer = 0, bgmStep = 0;
const bgmNotes = [110, 130, 146, 130, 110, 165, 146, 165]; 

let arena = Array.from({length: 20}, () => new Array(12).fill(0));
let player = { pos: {x: 0, y: 0}, matrix: null };
let snake = [], snakeDir = { x: 0, y: -1 }, snakeNextDir = { x: 0, y: -1 };
let apple = { x: 0, y: 0 }, tetrisDropCounter = 0, snakeTimer = 0;
let pongPaddle = { x: 4, y: 19, width: 4, height: 0.8 }, pongBall = { x: 6, y: 10, vx: 0.1, vy: 0.15, radius: 0.4 };
let brickPaddle = { x: 4, y: 19, width: 4, height: 0.8 }, brickBall = { x: 6, y: 15, vx: 0.08, vy: -0.12 }, bricks = [];
let tttBoard = new Array(9).fill(''), tttTurn = 'X';

let invaderPlayerX = 5, invaderBullets = [], invaderEnemies = [], invaderDir = 1, invaderMoveTimer = 0;

function updateUIStrings() {
    const lang = i18n[currentLang] || i18n.uk;
    if (!isPlaying) gameTitleText.innerText = lang.consoleTitle;
    document.getElementById('tx-select-module').innerText = lang.selectModule;
    document.getElementById('tx-username-label').innerText = lang.usernameLabel;
    document.getElementById('tx-paused').innerText = lang.paused;
    document.getElementById('tx-resume').innerText = lang.resume;
    document.getElementById('tx-quit').innerText = lang.quit;
    document.getElementById('tx-again').innerText = lang.again;
    document.getElementById('tx-main-menu').innerText = lang.mainMenu;

    document.getElementById('lang-uk').classList.toggle('active', currentLang === 'uk');
    document.getElementById('lang-en').classList.toggle('active', currentLang === 'en');
    document.body.setAttribute('data-theme', activeTheme);
    
    muteBtn.innerText = isMuted ? "❌" : "🔊";
    updateScoresDisplay();
}

function cycleTheme() {
    initAudio();
    const themes = ['cyber', 'classic', 'matrix'];
    activeTheme = themes[(themes.indexOf(activeTheme) + 1) % themes.length];
    safeStorage.setItem('arcade_theme', activeTheme);
    playSound('click');
    updateUIStrings();
}

function changeLanguage(lang) { initAudio(); currentLang = lang; safeStorage.setItem('arcade_lang', lang); playSound('click'); updateUIStrings(); }
function toggleMute() { initAudio(); isMuted = !isMuted; safeStorage.setItem('arcade_muted', isMuted); updateUIStrings(); }

function triggerVibrate(ms) {
    if (navigator.vibrate) navigator.vibrate(ms);
}

// АКТИВАЦІЯ AUDIO CONTEXT ДЛЯ МОБІЛЬНИХ ПРИСТРОЇВ
let audioCtx = null;
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

function playSound(type, customFreq = null) {
    if (isMuted) return;
    try {
        initAudio();
        const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
        osc.connect(gainNode); gainNode.connect(audioCtx.destination);
        const now = audioCtx.currentTime;

        if (type === 'bgm') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(customFreq, now);
            gainNode.gain.setValueAtTime(0.04, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.18);
            osc.start(now); osc.stop(now + 0.18);
        } else if (type === 'click') {
            osc.type = 'square'; osc.frequency.setValueAtTime(140, now);
            gainNode.gain.setValueAtTime(0.05, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.05);
            osc.start(now); osc.stop(now + 0.05);
        } else if (type === 'score') {
            osc.type = 'square'; osc.frequency.setValueAtTime(300, now); osc.frequency.setValueAtTime(500, now + 0.06);
            gainNode.gain.setValueAtTime(0.06, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.12);
            osc.start(now); osc.stop(now + 0.12);
        } else if (type === 'gameover') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(180, now); osc.frequency.linearRampToValueAtTime(40, now + 0.4);
            gainNode.gain.setValueAtTime(0.12, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.4);
            osc.start(now); osc.stop(now + 0.4);
        } else if (type === 'boot') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(600, now); osc.frequency.setValueAtTime(900, now + 0.1);
            gainNode.gain.setValueAtTime(0.05, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.2);
            osc.start(now); osc.stop(now + 0.2);
        }
    } catch (e) {}
}

if(safeStorage.getItem('arcade_username')) {
    usernameInput.value = safeStorage.getItem('arcade_username');
    currentPlayerName = safeStorage.getItem('arcade_username');
}
usernameInput.addEventListener('input', () => {
    let name = usernameInput.value.trim().toUpperCase() || "PLAYER 1";
    currentPlayerName = name; safeStorage.setItem('arcade_username', name);
});

function bootGame(gameType) {
    initAudio();
    playSound('click');
    startMenu.classList.add('hidden');
    bootScreen.classList.remove('hidden');
    document.getElementById('boot-log').innerHTML = `CYBER-BOY BIOS v2.6<br>CHECKING RAM... OK<br>LOADING ${gameType.toUpperCase()} ROM...`;
    
    let bootInterval = setInterval(() => playSound('click'), 150);

    setTimeout(() => {
        clearInterval(bootInterval);
        playSound('boot');
        bootScreen.classList.add('hidden');
        currentGame = gameType; 
        gameTitleText.innerText = gameType.toUpperCase();
        isPlaying = true;
        restartCurrentGame();
    }, 1100);
}

function showStartMenu() {
    initAudio();
    isPlaying = false; isPaused = false;
    startMenu.classList.remove('hidden'); pauseMenu.classList.add('hidden'); gameOverMenu.classList.add('hidden');
    currentGame = ''; updateUIStrings();
}

function restartCurrentGame() {
    initAudio();
    score = 0; isPaused = false; isPlaying = true;
    gameOverMenu.classList.add('hidden'); pauseMenu.classList.add('hidden');
    document.getElementById('over-title').innerText = i18n[currentLang].failure;

    if (currentGame === 'tetris') {
        arena.forEach(row => row.fill(0)); tetrisDropCounter = 0; playerReset();
    } else if (currentGame === 'snake') {
        snake = [{x: 6, y: 10}, {x: 6, y: 11}, {x: 6, y: 12}];
        snakeDir = {x: 0, y: -1}; snakeNextDir = {x: 0, y: -1}; snakeTimer = 0; spawnApple();
    } else if (currentGame === 'pong') {
        pongPaddle.x = 4; pongBall = { x: 6, y: 5, vx: 0.08, vy: 0.12, radius: 0.4 };
    } else if (currentGame === 'brick') {
        brickPaddle.x = 4; brickBall = { x: 6, y: 14, vx: 0.07, vy: -0.1 }; bricks = [];
        for (let r = 0; r < 4; r++) {
            for (let c = 0; c < 6; c++) {
                bricks.push({ x: c * 2, y: r + 2, status: 1, color: ['#FF0D72','#0DC2FF','#0DFF72','#FFE138'][r] });
            }
        }
    } else if (currentGame === 'ttt') { tttBoard.fill(''); tttTurn = 'X'; drawTTT(); }
    else if (currentGame === 'invaders') {
        invaderPlayerX = 5; invaderBullets = []; invaderEnemies = []; invaderDir = 1; invaderMoveTimer = 0;
        for (let r = 0; r < 3; r++) {
            for (let c = 1; c < 11; c++) { invaderEnemies.push({ x: c, y: r + 2, alive: true }); }
        }
    }
    updateScoresDisplay();
}

function togglePause() {
    if (!isPlaying || currentGame === 'ttt') return;
    initAudio();
    isPaused = !isPaused; playSound('click');
    pauseMenu.classList.toggle('hidden', !isPaused);
}

function triggerGameOver(customTitle) {
    isPlaying = false; playSound('gameover'); triggerVibrate([250, 100, 250]);
    const lang = i18n[currentLang];
    document.getElementById('over-title').innerText = customTitle || lang.failure;
    
    if (currentGame !== 'ttt') {
        finalScoreText.innerText = currentPlayerName + lang.resultStr + score;
        const recKey = 'best_val_v3_' + currentGame; const nameKey = 'best_name_v3_' + currentGame;
        let currentRecord = parseInt(safeStorage.getItem(recKey)) || 0;
        if (score > currentRecord) { safeStorage.setItem(recKey, score); safeStorage.setItem(nameKey, currentPlayerName); }
    } else { finalScoreText.innerText = lang.matchOver; }
    updateScoresDisplay(); gameOverMenu.classList.remove('hidden');
}

function updateScoresDisplay() {
    const lang = i18n[currentLang];
    document.getElementById('score').innerText = lang.scoreStr + score;
    if (currentGame && currentGame !== 'ttt') {
        const bestVal = safeStorage.getItem('best_val_v3_' + currentGame) || 0;
        const bestName = safeStorage.getItem('best_name_v3_' + currentGame) || 'NONE';
        document.getElementById('best-score').innerText = `${lang.bestStr}${bestVal} (${bestName})`;
    } else { document.getElementById('best-score').innerText = lang.bestStr + '0 (NONE)'; }
}

// КЕРУВАННЯ
function actionLeft() {
    if (currentGame === 'tetris') { player.pos.x--; if(collide(arena,player)) player.pos.x++; else playSound('click'); }
    else if (currentGame === 'snake' && snakeDir.x === 0) { snakeNextDir = { x: -1, y: 0 }; playSound('click'); }
    else if (currentGame === 'pong' && pongPaddle.x > 0) { pongPaddle.x = Math.max(0, pongPaddle.x - 1.5); playSound('click'); }
    else if (currentGame === 'brick' && brickPaddle.x > 0) { brickPaddle.x = Math.max(0, brickPaddle.x - 1.5); playSound('click'); }
    else if (currentGame === 'invaders' && invaderPlayerX > 0) { invaderPlayerX--; playSound('click'); }
}
function actionRight() {
    if (currentGame === 'tetris') { player.pos.x++; if(collide(arena,player)) player.pos.x--; else playSound('click'); }
    else if (currentGame === 'snake' && snakeDir.x === 0) { snakeNextDir = { x: 1, y: 0 }; playSound('click'); }
    else if (currentGame === 'pong' && pongPaddle.x < 12 - pongPaddle.width) { pongPaddle.x = Math.min(12 - pongPaddle.width, pongPaddle.x + 1.5); playSound('click'); }
    else if (currentGame === 'brick' && brickPaddle.x < 12 - brickPaddle.width) { brickPaddle.x = Math.min(12 - brickPaddle.width, brickPaddle.x + 1.5); playSound('click'); }
    else if (currentGame === 'invaders' && invaderPlayerX < 11) { invaderPlayerX++; playSound('click'); }
}
function actionUp() {
    if (currentGame === 'tetris') { rotateMatrix(player.matrix); if(collide(arena,player)) { rotateMatrix(player.matrix); rotateMatrix(player.matrix); rotateMatrix(player.matrix); } else playSound('click'); }
    else if (currentGame === 'snake' && snakeDir.y === 0) { snakeNextDir = { x: 0, y: -1 }; playSound('click'); }
    else if (currentGame === 'invaders') {
        invaderBullets.push({ x: invaderPlayerX + 0.5, y: 18 }); playSound('score'); triggerVibrate(15);
    }
}
function actionDown() {
    if (currentGame === 'tetris') playerDrop();
    else if (currentGame === 'snake' && snakeDir.y === 0) { snakeNextDir = { x: 0, y: 1 }; playSound('click'); }
}

// ЛОГІКА ІГОР
function createPiece(t) {
    if (t === 'T') return [[0,0,0],[1,1,1],[0,1,0]]; if (t === 'O') return [[2,2],[2,2]];
    if (t === 'L') return [[0,3,0],[0,3,0],[0,3,3]]; if (t === 'J') return [[0,4,0],[0,4,0],[4,4,0]];
    if (t === 'I') return [[0,5,0,0],[0,5,0,0],[0,5,0,0],[0,5,0,0]];
    if (t === 'S') return [[0,6,6],[6,6,0],[0,0,0]]; if (t === 'Z') return [[7,7,0],[0,7,7],[0,0,0]];
}
function collide(a, p) {
    const [m, o] = [p.matrix, p.pos];
    for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < m[y].length; ++x) { if (m[y][x] !== 0 && (a[y + o.y] && a[y + o.y][x + o.x]) !== 0) return true; }
    }
    return false;
}
function playerReset() {
    const p = 'ILJOTSZ'; player.matrix = createPiece(p[Math.floor(Math.random()*p.length)]);
    player.pos.y = 0; player.pos.x = (6 - player.matrix[0].length / 2 | 0);
    if (collide(arena, player)) triggerGameOver();
}
function playerDrop() {
    player.pos.y++;
    if (collide(arena, player)) {
        player.pos.y--;
        player.matrix.forEach((row, y) => { row.forEach((v, x) => { if (v !== 0) arena[y + player.pos.y][x + player.pos.x] = v; }); });
        playerReset(); tetrisSweep(); updateScoresDisplay(); playSound('click'); triggerVibrate(20);
    }
    tetrisDropCounter = 0;
}
function tetrisSweep() {
    let rc = 1; let cleared = false;
    outer: for (let y = arena.length - 1; y > 0; --y) {
        for (let x = 0; x < arena[y].length; ++x) { if (arena[y][x] === 0) continue outer; }
        arena.splice(y, 1); arena.unshift(new Array(12).fill(0)); ++y; score += rc * 10; rc *= 2; cleared = true;
    }
    if (cleared) { playSound('score'); triggerVibrate(60); }
}
function rotateMatrix(matrix) {
    for (let y = 0; y < matrix.length; ++y) { for (let x = 0; x < y; ++x) { [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]]; } }
    matrix.forEach(row => row.reverse());
}

function spawnApple() {
    apple.x = Math.floor(Math.random() * 12); apple.y = Math.floor(Math.random() * 20);
    if (snake.some(c => c.x === apple.x && c.y === apple.y)) spawnApple();
}
function updateSnake() {
    snakeDir = snakeNextDir; const head = { x: snake[0].x + snakeDir.x, y: snake[0].y + snakeDir.y };
    if (head.x < 0 || head.x >= 12 || head.y < 0 || head.y >= 20 || snake.some(c => c.x === head.x && c.y === head.y)) { triggerGameOver(); return; }
    snake.unshift(head);
    if (head.x === apple.x && head.y === apple.y) { score += 10; updateScoresDisplay(); spawnApple(); playSound('score'); triggerVibrate(30); } else { snake.pop(); }
}

function updatePong() {
    let speedMultiplier = 1 + (score * 0.02);
    pongBall.x += pongBall.vx * speedMultiplier; pongBall.y += pongBall.vy * speedMultiplier;
    if (pongBall.x - pongBall.radius < 0 || pongBall.x + pongBall.radius > 12) { pongBall.vx *= -1; playSound('click'); }
    if (pongBall.y - pongBall.radius < 0) { pongBall.vy *= -1; playSound('click'); }
    if (pongBall.y + pongBall.radius >= pongPaddle.y && pongBall.x >= pongPaddle.x && pongBall.x <= pongPaddle.x + pongPaddle.width) {
        pongBall.vy = -Math.abs(pongBall.vy); score += 5; updateScoresDisplay(); playSound('score'); triggerVibrate(25);
        pongBall.vx += (Math.random() - 0.5) * 0.05;
    }
    if (pongBall.y > 20) triggerGameOver();
}

function updateBrick() {
    let speedMultiplier = 1 + (score * 0.005);
    brickBall.x += brickBall.vx * speedMultiplier; brickBall.y += brickBall.vy * speedMultiplier;
    if (brickBall.x < 0 || brickBall.x > 12) { brickBall.vx *= -1; playSound('click'); }
    if (brickBall.y < 0) { brickBall.vy *= -1; playSound('click'); }
    if (brickBall.y >= brickPaddle.y && brickBall.x >= brickPaddle.x && brickBall.x <= brickPaddle.x + brickPaddle.width) { brickBall.vy = -Math.abs(brickBall.vy); playSound('click'); triggerVibrate(20); }
    bricks.forEach(b => {
        if (b.status === 1 && brickBall.x >= b.x && brickBall.x <= b.x + 2 && brickBall.y >= b.y && brickBall.y <= b.y + 1) {
            b.status = 0; brickBall.vy *= -1; score += 10; updateScoresDisplay(); playSound('score'); triggerVibrate(30);
        }
    });
    if (brickBall.y > 20) triggerGameOver();
    if (bricks.every(b => b.status === 0)) triggerGameOver(i18n[currentLang].victory);
}

function checkTTTWin(b) {
    const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for (let l of lines) { if (b[l[0]] && b[l[0]] === b[l[1]] && b[l[0]] === b[l[2]]) return b[l[0]]; }
    return b.every(c => c !== '') ? 'Draw' : null;
}
function aiMove() {
    let empty = tttBoard.map((c, i) => c === '' ? i : null).filter(v => v !== null);
    if (empty.length > 0 && isPlaying) {
        tttBoard[empty[Math.floor(Math.random() * empty.length)]] = 'O'; playSound('click');
        let win = checkTTTWin(tttBoard);
        if (win) triggerGameOver(win === 'Draw' ? i18n[currentLang].draw : i18n[currentLang].cpuWins); else tttTurn = 'X';
    }
}

// Універсальний клік по Canvas для Хрестиків-нуликів (ПК + Мобільні без лагів)
canvas.addEventListener('pointerdown', event => {
    if (currentGame !== 'ttt' || !isPlaying) return;
    initAudio();
    const r = canvas.getBoundingClientRect(); const mx = (event.clientX - r.left) / (r.width / 12); const my = (event.clientY - r.top) / (r.height / 20);
    if (mx >= 1.5 && mx <= 10.5 && my >= 5 && my <= 14 && tttTurn === 'X') {
        let idx = Math.floor((my - 5) / 3) * 3 + Math.floor((mx - 1.5) / 3);
        if (tttBoard[idx] === '') {
            tttBoard[idx] = 'X'; score++; playSound('score'); let win = checkTTTWin(tttBoard);
            if (win) triggerGameOver(win === 'Draw' ? i18n[currentLang].draw : i18n[currentLang].youWin); else { tttTurn = 'O'; setTimeout(aiMove, 350); }
        }
    }
});

// СТАБІЛЬНИЙ РУШІЙ SPACE INVADERS
function updateInvaders(deltaTime) {
    // Безпечне видалення куль через зворотний цикл
    for (let i = invaderBullets.length - 1; i >= 0; i--) {
        invaderBullets[i].y -= 0.4; 
        if (invaderBullets[i].y < 0) invaderBullets.splice(i, 1);
    }

    invaderMoveTimer += deltaTime;
    let speed = Math.max(100, 600 - (score * 10)); 
    if (invaderMoveTimer > speed) {
        let shiftDown = false;
        invaderEnemies.forEach(e => {
            if (e.alive) {
                let nextX = e.x + invaderDir * 0.5;
                if (nextX > 11.2 || nextX < 0.2) shiftDown = true;
            }
        });
        if (shiftDown) {
            invaderDir *= -1;
            invaderEnemies.forEach(e => { if (e.alive) { e.y += 1; if (e.y >= 18) triggerGameOver(); } });
        } else {
            invaderEnemies.forEach(e => { if (e.alive) e.x += invaderDir * 0.5; });
        }
        invaderMoveTimer = 0;
    }

    // Безпечний прорахунок влучань
    for (let bIdx = invaderBullets.length - 1; bIdx >= 0; bIdx--) {
        let b = invaderBullets[bIdx];
        let hit = false;
        for (let e of invaderEnemies) {
            if (e.alive && b.x >= e.x && b.x <= e.x + 1 && b.y >= e.y && b.y <= e.y + 0.8) {
                e.alive = false; 
                score += 10; 
                updateScoresDisplay();
                playSound('click'); 
                triggerVibrate(25);
                hit = true;
                break;
            }
        }
        if (hit) {
            invaderBullets.splice(bIdx, 1);
        }
    }

    if (invaderEnemies.every(e => !e.alive)) triggerGameOver(i18n[currentLang].victory);
}

// МАЛЮВАННЯ
function draw() {
    context.fillStyle = activeTheme === 'classic' ? '#8b966c' : '#0a0710';
    context.fillRect(0, 0, 12, 20);

    if (currentGame === 'tetris') {
        const colors = [null, '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'];
        arena.forEach((r, y) => r.forEach((v, x) => { if(v) { context.fillStyle=colors[v]; context.fillRect(x,y,1,1); } }));
        if (player.matrix) player.matrix.forEach((r, y) => r.forEach((v, x) => { if(v) { context.fillStyle=colors[v]; context.fillRect(x+player.pos.x, y+player.pos.y,1,1); } }));
    } else if (currentGame === 'snake') {
        context.fillStyle = '#FF0D72'; context.fillRect(apple.x, apple.y, 1, 1);
        snake.forEach((c, i) => { context.fillStyle = i===0 ? '#0DFF72':'#0DC2FF'; context.fillRect(c.x, c.y, 1, 1); });
    } else if (currentGame === 'pong') {
        context.fillStyle = '#FFE138'; context.fillRect(pongPaddle.x, pongPaddle.y, pongPaddle.width, pongPaddle.height);
        context.fillStyle = '#fff'; context.beginPath(); context.arc(pongBall.x, pongBall.y, pongBall.radius, 0, Math.PI*2); context.fill();
    } else if (currentGame === 'brick') {
        context.fillStyle = '#F538FF'; context.fillRect(brickPaddle.x, brickPaddle.y, brickPaddle.width, brickPaddle.height);
        context.fillStyle = '#fff'; context.fillRect(brickBall.x, brickBall.y, 0.5, 0.5);
        bricks.forEach(b => { if(b.status===1){ context.fillStyle=b.color; context.fillRect(b.x, b.y, 1.9, 0.8); } });
    } else if (currentGame === 'ttt') { drawTTT(); }
    else if (currentGame === 'invaders') {
        context.fillStyle = '#0DC2FF'; context.fillRect(invaderPlayerX, 18.5, 1, 0.8);
        context.fillStyle = '#fff'; invaderBullets.forEach(b => context.fillRect(b.x, b.y, 0.2, 0.5));
        invaderEnemies.forEach(e => { if (e.alive) { context.fillStyle = '#FF0D72'; context.fillRect(e.x, e.y, 0.8, 0.6); } });
    }
}

function drawTTT() {
    context.strokeStyle = 'rgba(255,255,255,0.2)'; context.lineWidth = 0.1;
    for(let i=1; i<3; i++) {
        context.beginPath(); context.moveTo(1.5 + i*3, 5); context.lineTo(1.5 + i*3, 14); context.stroke();
        context.beginPath(); context.moveTo(1.5, 5 + i*3); context.lineTo(10.5, 5 + i*3); context.stroke();
    }
    tttBoard.forEach((cell, i) => {
        let cx = 1.5 + (i % 3) * 3 + 1.5; let cy = 5 + Math.floor(i / 3) * 3 + 1.5;
        context.font = "bold 2.2px monospace"; context.textAlign = "center"; context.textBaseline = "middle";
        if(cell === 'X') { context.fillStyle = '#FF8E0D'; context.fillText('X', cx, cy); }
        if(cell === 'O') { context.fillStyle = '#0DC2FF'; context.fillText('O', cx, cy); }
    });
}

// ГОЛОВНИЙ ЦИКЛ ОНОВЛЕННЯ
function update(time = 0) {
    const deltaTime = time - lastTime; lastTime = time;
    if (isPlaying && !isPaused) {
        
        // Ретро-музика (BGM)
        bgmTimer += deltaTime;
        let bgmTempo = Math.max(160, 360 - (score * 2)); 
        if (bgmTimer > bgmTempo) {
            playSound('bgm', bgmNotes[bgmStep % bgmNotes.length]);
            bgmStep++; bgmTimer = 0;
        }

        if (currentGame === 'tetris') {
            tetrisDropCounter += deltaTime;
            let dynamicTetrisSpeed = Math.max(120, 800 - Math.floor(score / 40) * 100);
            if (tetrisDropCounter > dynamicTetrisSpeed) playerDrop();
        } else if (currentGame === 'snake') {
            snakeTimer += deltaTime;
            let dynamicSnakeSpeed = Math.max(45, 150 - Math.floor(score / 30) * 20);
            if (snakeTimer > dynamicSnakeSpeed) { updateSnake(); snakeTimer = 0; }
        } else if (currentGame === 'pong') { updatePong(); }
        else if (currentGame === 'brick') { updateBrick(); }
        else if (currentGame === 'invaders') { updateInvaders(deltaTime); }
        draw();
    }
    requestAnimationFrame(update);
}

// НАДІЙНИЙ РЕЄСТРАТОР ТАПІВ / КЛІКІВ БЕЗ ДУБЛЮВАННЯ В ДВОХ РЕЖИМАХ
const bindTouch = (elementId, actionFn) => {
    const el = document.getElementById(elementId); if(!el) return;
    
    // Мобільний режим (запобігає емуляції mouse подій браузером)
    el.addEventListener('touchstart', (e) => {
        e.preventDefault(); 
        initAudio(); 
        actionFn();
    }, { passive: false });
    
    // Режим ПК
    el.addEventListener('mousedown', (e) => {
        if (e.button === 0) { 
            initAudio(); 
            actionFn();
        }
    });
};

bindTouch('touch-left', actionLeft); bindTouch('touch-right', actionRight);
bindTouch('touch-up', actionUp); bindTouch('touch-down', actionDown);
bindTouch('touch-a', actionUp); bindTouch('touch-b', actionDown);
bindTouch('touch-pause', togglePause);

// КЕРУВАННЯ КЛАВІАТУРОЮ (БЛОКУЄ СМІКАННЯ СТОРІНКИ)
document.addEventListener('keydown', event => {
    const k = event.keyCode;
    
    // Блокуємо скрол стрілками та пробілом під час гри
    if ([32, 37, 38, 39, 40].includes(k) && isPlaying) {
        event.preventDefault();
    }
    
    if (k === 80 || k === 27) { togglePause(); return; }
    if (!isPlaying || isPaused) return;
    if (k === 37) actionLeft(); if (k === 39) actionRight(); if (k === 38) actionUp(); if (k === 40) actionDown();
    if (k === 32 || k === 90) actionUp(); 
});

try { updateUIStrings(); update(); } catch(e) { console.error(e); }
</script>
