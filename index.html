<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cyber Game Boy Classic - Hybrid OS</title>
    <style>
        /* БАЗОВІ НАЛАШТУВАННЯ БЕЗ РИЗИКОВАНИХ FIXED ПРАВИЛ */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #121114;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ПОЧАТКОВИЙ ЕКРАН */
        #welcome-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #121114;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #39ff14;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .boot-box {
            width: 100%;
            max-width: 380px;
            background: #1a191e;
            border: 3px dashed #39ff14;
            padding: 25px 20px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.2);
            text-align: center;
            box-sizing: border-box;
        }

        .boot-title {
            font-size: 20px;
            font-weight: 900;
            margin-bottom: 15px;
            letter-spacing: 1px;
            text-shadow: 0 0 5px #39ff14;
        }

        .boot-field {
            margin-bottom: 20px;
            text-align: left;
        }

        .boot-field label {
            display: block;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .boot-input {
            width: 100%;
            padding: 10px;
            background: #000;
            border: 2px solid #39ff14;
            color: #39ff14;
            font-family: inherit;
            font-size: 14px;
            text-align: center;
            border-radius: 4px;
            text-transform: uppercase;
            box-sizing: border-box;
            font-weight: bold;
            outline: none;
        }

        .device-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 5px;
        }

        .device-btn {
            flex: 1;
            padding: 12px;
            font-family: inherit;
            font-size: 11px;
            font-weight: bold;
            background: #222;
            color: #888;
            border: 2px solid #444;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        .device-btn.selected {
            background: #39ff14;
            color: #000;
            border-color: #39ff14;
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
        }

        .launch-btn {
            width: 100%;
            padding: 14px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 900;
            background: #39ff14;
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #22990c;
        }
        .launch-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #22990c;
        }

        /* ГНУЧКА СІТКА КОНСОЛІ (Мобільна за замовчуванням) */
        .gb-console {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto auto;
            grid-template-areas: 
                "screen screen"
                "dpad ab"
                "sysbar sysbar";
            gap: 10px;
            
            width: 100%;
            height: 100%;
            max-width: 440px;
            margin: 0 auto;
            background: #e4e2d7; 
            box-sizing: border-box;
            padding: env(safe-area-inset-top, 15px) 20px env(safe-area-inset-bottom, 15px) 20px;
            position: relative;
            box-shadow: inset -4px -4px 12px rgba(0,0,0,0.35), inset 4px 4px 12px rgba(255,255,255,0.6);
            border-radius: 10px 10px 40px 10px;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.6s ease, transform 0.6s ease;
            pointer-events: none; 
        }

        .gb-console.ready {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        /* АДАПТИВНІСТЬ ПІД ПК (КНОПКИ З БОКІВ) */
        @media (min-width: 850px) {
            .gb-console {
                max-width: 920px;
                height: auto;
                grid-template-columns: 190px 1fr 190px;
                grid-template-rows: auto auto;
                grid-template-areas: 
                    "dpad screen ab"
                    "blank sysbar blank2";
                align-items: center;
                gap: 25px;
                padding: 35px 30px;
                border-radius: 24px;
            }

            .gb-screen-frame { margin-top: 0 !important; }
            .dpad-container { justify-self: center !important; padding-left: 0 !important; margin-top: 0 !important; }
            .ab-container { justify-self: center !important; margin-top: 0 !important; }
            .gb-system-bar { margin-top: 5px !important; padding-bottom: 0 !important; }
            .gb-speaker-grill { bottom: 15px !important; right: 35px !important; }
        }

        /* ЕКРАННА ПАНЕЛЬ */
        .gb-screen-frame {
            grid-area: screen;
            background: #6d737a; 
            border-radius: 8px 8px 30px 8px;
            padding: 22px 25px 12px 25px;
            box-shadow: inset -3px -3px 6px rgba(255,255,255,0.2), inset 3px 3px 8px rgba(0,0,0,0.6);
            margin-top: 5px;
            position: relative;
        }

        .gb-screen-frame::before {
            content: ""; position: absolute; top: 8px; left: 0; right: 0; height: 3px;
            background: linear-gradient(to bottom, #3b5087 50%, #8b3b50 50%); opacity: 0.8;
        }

        .screen-header {
            display: flex; justify-content: space-between; color: #2b3033;
            font-size: 11px; font-weight: bold; margin-bottom: 8px; padding: 0 2px; letter-spacing: 0.5px;
        }
        #score, #best-score { color: #111; }

        .canvas-container {
            width: 100%; aspect-ratio: 12 / 14; background: #9ca082; border-radius: 4px;
            position: relative; overflow: hidden; border: 4px solid #3c4043;
            box-shadow: inset 4px 4px 10px rgba(0,0,0,0.5);
        }

        canvas { width: 100%; height: 100%; object-fit: fill; image-rendering: pixelated; filter: contrast(1.1) brightness(0.95); }

        .gb-logo-text { text-align: left; font-weight: bold; font-size: 14px; color: #2a3466; margin-top: 12px; padding-left: 5px; letter-spacing: 0.5px; }
        .gb-logo-text span { font-style: italic; font-size: 17px; font-weight: 900; }

        /* ОВЕРЛЕЇ / МЕНЮ */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(146, 150, 122, 0.98); display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 15px; box-sizing: border-box; z-index: 5; color: #111;
        }
        .hidden { display: none !important; }

        h1, h2 { font-size: 14px; margin: 0 0 10px 0; color: #000; text-transform: uppercase; text-align: center; font-weight: 900; }

        .menu-btn {
            padding: 7px 10px; font-size: 11px; font-family: inherit; font-weight: bold;
            color: #fff; background: #3c4043; border: 2px solid #111; border-radius: 4px;
            cursor: pointer; width: 95%; margin-bottom: 4px; text-transform: uppercase; box-shadow: 2px 2px 0px #111;
        }
        .menu-btn:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0px #111; }

        /* D-PAD */
        .dpad-container { grid-area: dpad; position: relative; width: 155px; height: 155px; justify-self: left; padding-left: 5px; margin-top: 15px; }
        .dpad-cross { position: absolute; top: 15px; left: 15px; width: 124px; height: 124px; }
        .dpad-btn { position: absolute; background: #222; border: 1px solid #111; box-shadow: inset -3px -3px 4px rgba(255,255,255,0.1), 3px 5px 6px rgba(0,0,0,0.4); }
        .dpad-btn::after { content: "::"; position: absolute; color: #444; font-size: 10px; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }

        .dpad-up    { top: 0; left: 42px; width: 40px; height: 44px; border-radius: 4px 4px 0 0; }
        .dpad-down  { bottom: 0; left: 42px; width: 40px; height: 44px; border-radius: 0 0 4px 4px; }
        .dpad-left  { top: 42px; left: 0; width: 44px; height: 40px; border-radius: 4px 0 0 4px; }
        .dpad-right { top: 42px; right: 0; width: 44px; height: 40px; border-radius: 0 4px 4px 0; }
        .dpad-center { top: 42px; left: 42px; width: 40px; height: 40px; background: #222; border: none; box-shadow: none; }
        .dpad-center::after { content: "" !important; }
        .dpad-btn:active { background: #111; }

        /* КНОПКИ А / В */
        .ab-container {
            grid-area: ab; justify-self: right; position: relative; width: 145px; height: 85px;
            background: #d8d6cb; border-radius: 45px; transform: rotate(-28deg);
            display: flex; justify-content: space-around; align-items: center; padding: 0 12px;
            box-sizing: border-box; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.15), 1px 2px 2px rgba(255,255,255,0.6); margin-top: 45px;
        }
        .action-button-wrapper { display: flex; flex-direction: column; align-items: center; }
        .action-circle-btn { width: 50px; height: 50px; background: #a91244; border: 1px solid #750529; border-radius: 50%; box-shadow: inset -4px -4px 5px rgba(0,0,0,0.35), 3px 5px 6px rgba(0,0,0,0.4); }
        .action-circle-btn:active { background: #870b34; box-shadow: inset 2px 2px 3px rgba(0,0,0,0.5); }
        .btn-label { font-weight: 900; font-size: 15px; color: #2a3466; margin-top: 6px; transform: rotate(28deg); }

        /* СИСТЕМНІ КНОПКИ */
        .gb-system-bar { grid-area: sysbar; display: flex; justify-content: center; gap: 30px; padding-bottom: 20px; margin-top: 15px; }
        .pill-sys-btn { display: flex; flex-direction: column; align-items: center; cursor: pointer; width: 65px; }
        .pill-trigger { width: 52px; height: 13px; background: #97999c; border-radius: 10px; transform: rotate(-28deg); border: 1px solid #75777a; box-shadow: inset -2px -2px 3px rgba(0,0,0,0.2), 2px 3px 4px rgba(0,0,0,0.35); }
        .pill-sys-btn:active .pill-trigger { background: #737578; }
        .pill-label { font-size: 10px; font-weight: 900; color: #2a3466; margin-top: 10px; text-transform: uppercase; letter-spacing: 0.5px; }

        /* ДИНАМІК */
        .gb-speaker-grill { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 6px; transform: rotate(-28deg); opacity: 0.7; }
        .speaker-line { width: 5px; height: 35px; background: #bcbaa8; border-radius: 4px; box-shadow: inset 1px 1px 2px rgba(0,0,0,0.4); }

        .sys-top-row { display: flex; gap: 5px; margin-bottom: 12px; width: 95%; justify-content: center; }
        .mini-btn { font-size: 11px; padding: 4px 10px; background: #3c4043; color: #fff; border: 1px solid #000; border-radius: 4px; font-weight: bold; cursor: pointer;}
        .mini-btn.active { background: #878b6d; color: #000; }
        
        .loading-bar-container { width: 85%; height: 10px; border: 2px solid #000; margin-top: 12px; position: relative; background: #bcbaa8; }
        .loading-bar { width: 0%; height: 100%; background: #000; animation: loadProgress 1.1s linear forwards; }
        @keyframes loadProgress { 0% { width: 0%; } 100% { width: 100%; } }
    </style>
</head>
<body>

    <!-- ПОЧАТКОВИЙ ЕКРАН КОНФІГУРАЦІЇ -->
    <div id="welcome-screen">
        <div class="boot-box">
            <div class="boot-title" id="boot-title-text">CYBER BOY OS v1.0</div>
            
            <div class="boot-field" style="text-align: center; margin-bottom: 15px;">
                <div style="font-size: 11px; font-weight: bold; margin-bottom: 6px;">[ SELECT LANGUAGE ]</div>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button class="mini-btn" id="boot-lang-uk" onclick="changeLanguage('uk')">UA</button>
                    <button class="mini-btn" id="boot-lang-en" onclick="changeLanguage('en')">EN</button>
                </div>
            </div>

            <div class="boot-field">
                <label for="boot-username" id="boot-lbl-nick">> ВВЕДІТЬ ВІЙСЬКОВИЙ НІКНЕЙМ:</label>
                <input type="text" id="boot-username" class="boot-input" maxlength="10" value="PLAYER 1">
            </div>

            <div class="boot-field">
                <label id="boot-lbl-device">> ОБЕРІТЬ ВАШ ПРИСТРІЙ:</label>
                <div class="device-selector">
                    <button class="device-btn" id="btn-pc" onclick="selectDevice('pc')">КОМП'ЮТЕР</button>
                    <button class="device-btn" id="btn-mobile" onclick="selectDevice('mobile')">ТЕЛЕФОН</button>
                </div>
            </div>

            <button class="launch-btn" id="btn-launch-text" onclick="launchConsole()">LAUNCH SYSTEM</button>
        </div>
    </div>

    <!-- ОСНОВНА КОНСОЛЬ GAME BOY -->
    <div class="gb-console" id="main-console">
        <div class="gb-screen-frame">
            <div class="screen-header">
                <div id="game-title-text">CYBER BOY</div>
                <div id="score">SCORE: 0</div>
                <div id="best-score">BEST: 0</div>
            </div>
            
            <div class="canvas-container">
                <canvas id="gameCanvas" width="240" height="280"></canvas>

                <!-- ГОЛОВНЕ МЕНЮ -->
                <div id="start-menu" class="overlay">
                    <div class="sys-top-row">
                        <button class="mini-btn" id="lang-uk" onclick="changeLanguage('uk')">UA</button>
                        <button class="mini-btn" id="lang-en" onclick="changeLanguage('en')">EN</button>
                        <button class="mini-btn" id="btn-mute" onclick="toggleMute()">🔊</button>
                    </div>

                    <h1 id="tx-select-module">SELECT MODULE</h1>
                    <div id="user-display-tag" style="font-size: 10px; font-weight: bold; margin-bottom: 10px; color: #222; text-transform: uppercase;"></div>

                    <button class="menu-btn" onclick="bootGame('tetris')">1. TETRIS</button>
                    <button class="menu-btn" onclick="bootGame('snake')">2. SNAKE</button>
                    <button class="menu-btn" onclick="bootGame('pong')">3. PONG TENNIS</button>
                    <button class="menu-btn" onclick="bootGame('brick')">4. ARKANOID</button>
                    <button class="menu-btn" onclick="bootGame('ttt')">5. TIC-TAC-TOE</button>
                    <button class="menu-btn" onclick="bootGame('invaders')">6. SPACE INVADERS</button>
                </div>

                <!-- BIOS -->
                <div id="boot-screen" class="overlay hidden">
                    <div style="font-size: 11px; text-align: left; line-height: 1.6; font-weight: bold;" id="boot-log">
                        GAME BOY BIOS v1.0<br>CHECKING ROM... OK
                    </div>
                    <div class="loading-bar-container"><div class="loading-bar"></div></div>
                </div>

                <!-- ПАУЗА -->
                <div id="pause-menu" class="overlay hidden">
                    <h1 id="tx-paused">PAUSED</h1>
                    <button class="menu-btn" id="tx-resume" onclick="togglePause()">RESUME</button>
                    <button class="menu-btn" onclick="showStartMenu()">QUIT</button>
                </div>

                <!-- GAME OVER -->
                <div id="game-over-menu" class="overlay hidden">
                    <h2 id="over-title">SYSTEM FAILURE</h2>
                    <div id="final-score" style="margin-bottom: 15px; font-size: 12px; font-weight: bold;">SCORE: 0</div>
                    <button class="menu-btn" id="tx-again" onclick="restartCurrentGame()">TRY AGAIN</button>
                    <button class="menu-btn" onclick="showStartMenu()">MAIN MENU</button>
                </div>
            </div>

            <div class="gb-logo-text">Nintendo <span>GAME BOY</span></div>
        </div>

        <!-- ХРЕСТИК D-PAD -->
        <div class="dpad-container">
            <div class="dpad-cross">
                <div class="dpad-btn dpad-center"></div>
                <div class="dpad-btn dpad-up" id="btn-dir-up"></div>
                <div class="dpad-btn dpad-down" id="btn-dir-down"></div>
                <div class="dpad-btn dpad-left" id="btn-dir-left"></div>
                <div class="dpad-btn dpad-right" id="btn-dir-right"></div>
            </div>
        </div>

        <!-- КНОПКИ А / В -->
        <div class="ab-container">
            <div class="action-button-wrapper">
                <div class="action-circle-btn" id="btn-action-b"></div>
                <div class="btn-label">B</div>
            </div>
            <div class="action-button-wrapper">
                <div class="action-circle-btn" id="btn-action-a"></div>
                <div class="btn-label">A</div>
            </div>
        </div>

        <!-- СИСТЕМНІ КНОПКИ -->
        <div class="gb-system-bar">
            <div class="pill-sys-btn" onclick="showStartMenu()">
                <div class="pill-trigger"></div>
                <div class="pill-label">SELECT</div>
            </div>
            <div class="pill-sys-btn" onclick="togglePause()">
                <div class="pill-trigger"></div>
                <div class="pill-label">START</div>
            </div>
        </div>

        <!-- ДИНАМІК -->
        <div class="gb-speaker-grill">
            <div class="speaker-line"></div>
            <div class="speaker-line"></div>
            <div class="speaker-line"></div>
            <div class="speaker-line"></div>
            <div class="speaker-line"></div>
        </div>
    </div>

<script>
const safeStorage = {
    getItem: function(key) { try { return localStorage.getItem(key); } catch(e) { return null; } },
    setItem: function(key, val) { try { localStorage.setItem(key, val); return true; } catch(e) { return false; } }
};

// ЧИСТІ РЯДКИ БЕЗ ЕМОДЗІ (ЗАПОБІГАЄ ЗБОЯМ НА СУРОГАТНИХ ПАРАХ)
const i18n = {
    uk: {
        bootTitle: "CYBER BOY OS v1.0",
        lblNickname: "> ВВЕДІТЬ ВІЙСЬКОВИЙ НІКНЕЙМ:",
        lblDevice: "> ОБЕРІТЬ ВАШ ПРИСТРІЙ:",
        btnPc: "КОМП'ЮТЕР",
        btnMobile: "ТЕЛЕФОН",
        btnLaunch: "ЗАПУСТИТИ СИСТЕМУ",
        consoleTitle: "CYBER BOY", selectModule: "ОБЕРИ МОДУЛЬ", userTag: "КОРИСТУВАЧ: ",
        paused: "ПАУЗА", resume: "ПРОДОВЖИТИ", failure: "СИСТЕМНИЙ ЗБІЙ", again: "ЗНОВУ",
        scoreStr: "SCORE: ", bestStr: "BEST: ", resultStr: ", РЕЗУЛЬТАТ: ",
        victory: "ПЕРЕМОГА!", draw: "НІЧИЯ!", youWin: "ТИ ВИГРАВ!", cpuWins: "РОБОТ ВИГРАВ!", matchOver: "МАТЧ ЗАВЕРШЕНО"
    },
    en: {
        bootTitle: "CYBER BOY OS v1.0",
        lblNickname: "> ENTER MILITARY NICKNAME:",
        lblDevice: "> SELECT YOUR DEVICE:",
        btnPc: "COMPUTER",
        btnMobile: "MOBILE",
        btnLaunch: "LAUNCH SYSTEM",
        consoleTitle: "CYBER BOY", selectModule: "SELECT MODULE", userTag: "USER: ",
        paused: "PAUSED", resume: "RESUME", failure: "SYSTEM FAILURE", again: "TRY AGAIN",
        scoreStr: "SCORE: ", bestStr: "BEST: ", resultStr: ", RESULT: ",
        victory: "VICTORY!", draw: "DRAW!", youWin: "YOU WIN!", cpuWins: "CPU WINS!", matchOver: "MATCH OVER"
    }
};

let currentLang = safeStorage.getItem('arcade_lang') || 'uk';
if (currentLang !== 'uk' && currentLang !== 'en') currentLang = 'uk'; // Валідація значення мови

let isMuted = safeStorage.getItem('arcade_muted') === 'true';
let selectedDeviceType = 'pc';

const canvas = document.getElementById('gameCanvas');
const context = canvas.getContext('2d');
context.scale(20, 14); 

const startMenu = document.getElementById('start-menu');
const bootScreen = document.getElementById('boot-screen');
const pauseMenu = document.getElementById('pause-menu');
const gameOverMenu = document.getElementById('game-over-menu');
const finalScoreText = document.getElementById('final-score');
const gameTitleText = document.getElementById('game-title-text');
const bootUsernameInput = document.getElementById('boot-username');
const userDisplayTag = document.getElementById('user-display-tag');
const muteBtn = document.getElementById('btn-mute');

let currentGame = ''; let isPaused = false; let isPlaying = false; let score = 0; let lastTime = 0;
let currentPlayerName = "PLAYER 1";

let bgmTimer = 0, bgmStep = 0;
const bgmNotes = [115, 130, 145, 130, 115, 160, 145, 160]; 

let arena = Array.from({length: 20}, () => new Array(12).fill(0));
let player = { pos: {x: 0, y: 0}, matrix: null };
let snake = [], snakeDir = { x: 0, y: -1 }, snakeNextDir = { x: 0, y: -1 };
let apple = { x: 0, y: 0 }, tetrisDropCounter = 0, snakeTimer = 0;
let pongPaddle = { x: 4, y: 19, width: 4, height: 0.8 }, pongBall = { x: 6, y: 10, vx: 0.1, vy: 0.15, radius: 0.4 };
let brickPaddle = { x: 4, y: 19, width: 4, height: 0.8 }, brickBall = { x: 6, y: 15, vx: 0.08, vy: -0.12 }, bricks = [];
let tttBoard = new Array(9).fill(''), tttTurn = 'X';
let invaderPlayerX = 5, invaderBullets = [], invaderEnemies = [], invaderDir = 1, invaderMoveTimer = 0;

function updateUIStrings() {
    const lang = i18n[currentLang] || i18n.uk;
    
    // Оновлення тексту
    document.getElementById('boot-title-text').innerText = lang.bootTitle;
    document.getElementById('boot-lbl-nick').innerText = lang.lblNickname;
    document.getElementById('boot-lbl-device').innerText = lang.lblDevice;
    
    // Динамічне та безпечне додавання емодзі перед текстом
    document.getElementById('btn-pc').innerText = (selectedDeviceType === 'pc' ? "✅ 💻 " : "💻 ") + lang.btnPc;
    document.getElementById('btn-mobile').innerText = (selectedDeviceType === 'mobile' ? "✅ 📱 " : "📱 ") + lang.btnMobile;
    document.getElementById('btn-launch-text').innerText = lang.btnLaunch;

    if (!isPlaying) gameTitleText.innerText = lang.consoleTitle;
    document.getElementById('tx-select-module').innerText = lang.selectModule;
    userDisplayTag.innerText = lang.userTag + currentPlayerName;
    document.getElementById('tx-paused').innerText = lang.paused;
    document.getElementById('tx-resume').innerText = lang.resume;
    document.getElementById('tx-again').innerText = lang.again;

    // Синхронізація підсвічування та класів
    document.getElementById('btn-pc').classList.toggle('selected', selectedDeviceType === 'pc');
    document.getElementById('btn-mobile').classList.toggle('selected', selectedDeviceType === 'mobile');
    document.getElementById('lang-uk').classList.toggle('active', currentLang === 'uk');
    document.getElementById('lang-en').classList.toggle('active', currentLang === 'en');
    document.getElementById('boot-lang-uk').classList.toggle('active', currentLang === 'uk');
    document.getElementById('boot-lang-en').classList.toggle('active', currentLang === 'en');
    
    muteBtn.innerText = isMuted ? "❌" : "🔊";
    updateScoresDisplay();
}

function selectDevice(type) {
    selectedDeviceType = type;
    try { playSound('click'); } catch(e){}
    updateUIStrings();
}

function launchConsole() {
    let name = bootUsernameInput.value.trim().toUpperCase() || "PLAYER 1";
    currentPlayerName = name;
    safeStorage.setItem('arcade_username', name);

    document.getElementById('welcome-screen').style.opacity = '0';
    document.getElementById('welcome-screen').style.transform = 'scale(1.05)';
    
    setTimeout(() => {
        document.getElementById('welcome-screen').classList.add('hidden');
        const consoleEl = document.getElementById('main-console');
        consoleEl.classList.add('ready');
        
        initAudio();
        playSound('boot');
        updateUIStrings();
    }, 500);
}

function changeLanguage(lang) { 
    initAudio(); 
    currentLang = lang; 
    safeStorage.setItem('arcade_lang', lang); 
    playSound('click'); 
    updateUIStrings(); 
}

function toggleMute() { initAudio(); isMuted = !isMuted; safeStorage.setItem('arcade_muted', isMuted); updateUIStrings(); }
function triggerVibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

let audioCtx = null;
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(type, customFreq = null) {
    if (isMuted) return;
    try {
        initAudio();
        const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
        osc.connect(gainNode); gainNode.connect(audioCtx.destination);
        const now = audioCtx.currentTime;

        if (type === 'bgm') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(customFreq, now);
            gainNode.gain.setValueAtTime(0.04, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.16);
            osc.start(now); osc.stop(now + 0.16);
        } else if (type === 'click') {
            osc.type = 'square'; osc.frequency.setValueAtTime(120, now);
            gainNode.gain.setValueAtTime(0.06, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.05);
            osc.start(now); osc.stop(now + 0.05);
        } else if (type === 'score') {
            osc.type = 'square'; osc.frequency.setValueAtTime(260, now); osc.frequency.setValueAtTime(440, now + 0.06);
            gainNode.gain.setValueAtTime(0.08, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.12);
            osc.start(now); osc.stop(now + 0.12);
        } else if (type === 'gameover') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.linearRampToValueAtTime(30, now + 0.45);
            gainNode.gain.setValueAtTime(0.15, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.45);
            osc.start(now); osc.stop(now + 0.45);
        } else if (type === 'boot') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(500, now); osc.frequency.setValueAtTime(800, now + 0.1);
            gainNode.gain.setValueAtTime(0.06, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.25);
            osc.start(now); osc.stop(now + 0.25);
        }
    } catch (e) {}
}

if(safeStorage.getItem('arcade_username')) {
    bootUsernameInput.value = safeStorage.getItem('arcade_username');
    currentPlayerName = safeStorage.getItem('arcade_username');
}

function bootGame(gameType) {
    initAudio(); playSound('click');
    startMenu.classList.add('hidden'); bootScreen.classList.remove('hidden');
    document.getElementById('boot-log').innerHTML = `GAME BOY BIOS v1.0<br>BOOTING ${gameType.toUpperCase()}...`;

    let bootInterval = setInterval(() => playSound('click'), 140);
    setTimeout(() => {
        clearInterval(bootInterval); playSound('boot');
        bootScreen.classList.add('hidden'); currentGame = gameType; 
        gameTitleText.innerText = gameType.toUpperCase(); isPlaying = true;
        restartCurrentGame();
    }, 1100);
}

function showStartMenu() {
    initAudio(); isPlaying = false; isPaused = false;
    startMenu.classList.remove('hidden'); pauseMenu.classList.add('hidden'); gameOverMenu.classList.add('hidden');
    currentGame = ''; updateUIStrings();
}

function restartCurrentGame() {
    initAudio(); score = 0; isPaused = false; isPlaying = true;
    gameOverMenu.classList.add('hidden'); pauseMenu.classList.add('hidden');
    
    const lang = i18n[currentLang] || i18n.uk;
    document.getElementById('over-title').innerText = lang.failure;

    if (currentGame === 'tetris') {
        arena.forEach(row => row.fill(0)); tetrisDropCounter = 0; playerReset();
    } else if (currentGame === 'snake') {
        snake = [{x: 6, y: 10}, {x: 6, y: 11}, {x: 6, y: 12}];
        snakeDir = {x: 0, y: -1}; snakeNextDir = {x: 0, y: -1}; snakeTimer = 0; spawnApple();
    } else if (currentGame === 'pong') {
        pongPaddle.x = 4; pongBall = { x: 6, y: 5, vx: 0.08, vy: 0.12, radius: 0.4 };
    } else if (currentGame === 'brick') {
        brickPaddle.x = 4; brickBall = { x: 6, y: 14, vx: 0.07, vy: -0.1 }; bricks = [];
        for (let r = 0; r < 4; r++) {
            for (let c = 0; c < 6; c++) {
                bricks.push({ x: c * 2, y: r + 2, status: 1, color: '#222' });
            }
        }
    } else if (currentGame === 'ttt') { tttBoard.fill(''); tttTurn = 'X'; drawTTT(); }
    else if (currentGame === 'invaders') {
        invaderPlayerX = 5; invaderBullets = []; invaderEnemies = []; invaderDir = 1; invaderMoveTimer = 0;
        for (let r = 0; r < 3; r++) {
            for (let c = 1; c < 11; c++) { invaderEnemies.push({ x: c, y: r + 2, alive: true }); }
        }
    }
    updateScoresDisplay();
}

function togglePause() {
    if (!isPlaying || currentGame === 'ttt') return;
    initAudio(); isPaused = !isPaused; playSound('click');
    pauseMenu.classList.toggle('hidden', !isPaused);
}

function triggerGameOver(customTitle) {
    isPlaying = false; playSound('gameover'); triggerVibrate([150, 50, 150]);
    const lang = i18n[currentLang] || i18n.uk;
    document.getElementById('over-title').innerText = customTitle || lang.failure;
    
    if (currentGame !== 'ttt') {
        finalScoreText.innerText = currentPlayerName + lang.resultStr + score;
        const recKey = 'best_val_v3_' + currentGame; const nameKey = 'best_name_v3_' + currentGame;
        let currentRecord = parseInt(safeStorage.getItem(recKey)) || 0;
        if (score > currentRecord) { safeStorage.setItem(recKey, score); safeStorage.setItem(nameKey, currentPlayerName); }
    } else { finalScoreText.innerText = lang.matchOver; }
    updateScoresDisplay(); gameOverMenu.classList.remove('hidden');
}

function updateScoresDisplay() {
    const lang = i18n[currentLang] || i18n.uk;
    document.getElementById('score').innerText = lang.scoreStr + score;
    if (currentGame && currentGame !== 'ttt') {
        const bestVal = safeStorage.getItem('best_val_v3_' + currentGame) || 0;
        document.getElementById('best-score').innerText = `${lang.bestStr}${bestVal}`;
    } else { document.getElementById('best-score').innerText = lang.bestStr + '0'; }
}

function pressDpad(direction) {
    if (!isPlaying || isPaused) return;
    if (direction === 'left') {
        if (currentGame === 'tetris') { player.pos.x--; if(collide(arena,player)) player.pos.x++; else playSound('click'); }
        else if (currentGame === 'snake' && snakeDir.x === 0) { snakeNextDir = { x: -1, y: 0 }; playSound('click'); }
        else if ((currentGame === 'pong' || currentGame === 'brick') && pongPaddle.x > 0) { pongPaddle.x = Math.max(0, pongPaddle.x - 1.5); brickPaddle.x = pongPaddle.x; playSound('click'); }
        else if (currentGame === 'invaders' && invaderPlayerX > 0) { invaderPlayerX--; playSound('click'); }
    }
    if (direction === 'right') {
        if (currentGame === 'tetris') { player.pos.x++; if(collide(arena,player)) player.pos.x--; else playSound('click'); }
        else if (currentGame === 'snake' && snakeDir.x === 0) { snakeNextDir = { x: 1, y: 0 }; playSound('click'); }
        else if ((currentGame === 'pong' || currentGame === 'brick') && pongPaddle.x < 12 - pongPaddle.width) { pongPaddle.x = Math.min(12 - pongPaddle.width, pongPaddle.x + 1.5); brickPaddle.x = pongPaddle.x; playSound('click'); }
        else if (currentGame === 'invaders' && invaderPlayerX < 11) { invaderPlayerX++; playSound('click'); }
    }
    if (direction === 'up') {
        if (currentGame === 'snake' && snakeDir.y === 0) { snakeNextDir = { x: 0, y: -1 }; playSound('click'); }
    }
    if (direction === 'down') {
        if (currentGame === 'tetris') playerDrop();
        else if (currentGame === 'snake' && snakeDir.y === 0) { snakeNextDir = { x: 0, y: 1 }; playSound('click'); }
    }
}

function pressAction(button) {
    if (!isPlaying || isPaused) return;
    if (button === 'A') {
        if (currentGame === 'tetris') { rotateMatrix(player.matrix); if(collide(arena,player)) { rotateMatrix(player.matrix); rotateMatrix(player.matrix); rotateMatrix(player.matrix); } else playSound('click'); }
        else if (currentGame === 'invaders') { invaderBullets.push({ x: invaderPlayerX + 0.5, y: 18 }); playSound('score'); triggerVibrate(15); }
    }
    if (button === 'B') {
        if (currentGame === 'tetris') { while(!collide(arena, player)) { player.pos.y++; } player.pos.y--; playerDrop(); }
    }
}

function createPiece(t) {
    if (t === 'T') return [[0,0,0],[1,1,1],[0,1,0]]; if (t === 'O') return [[1,1],[1,1]];
    if (t === 'L') return [[0,1,0],[0,1,0],[0,1,1]]; if (t === 'J') return [[0,1,0],[0,1,0],[1,1,0]];
    if (t === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
    if (t === 'S') return [[0,1,1],[1,1,0],[0,0,0]]; if (t === 'Z') return [[1,1,0],[0,1,1],[0,0,0]];
}
function collide(a, p) {
    const [m, o] = [p.matrix, p.pos];
    for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < m[y].length; ++x) { if (m[y][x] !== 0 && (a[y + o.y] && a[y + o.y][x + o.x]) !== 0) return true; }
    }
    return false;
}
function playerReset() {
    const p = 'ILJOTSZ'; player.matrix = createPiece(p[Math.floor(Math.random()*p.length)]);
    player.pos.y = 0; player.pos.x = (6 - player.matrix[0].length / 2 | 0);
    if (collide(arena, player)) triggerGameOver();
}
function playerDrop() {
    player.pos.y++;
    if (collide(arena, player)) {
        player.pos.y--;
        player.matrix.forEach((row, y) => { row.forEach((v, x) => { if (v !== 0) arena[y + player.pos.y][x + player.pos.x] = v; }); });
        playerReset(); tetrisSweep(); updateScoresDisplay(); playSound('click'); triggerVibrate(15);
    }
    tetrisDropCounter = 0;
}
function tetrisSweep() {
    let rc = 1; let cleared = false;
    outer: for (let y = arena.length - 1; y > 0; --y) {
        for (let x = 0; x < arena[y].length; ++x) { if (arena[y][x] === 0) continue outer; }
        arena.splice(y, 1); arena.unshift(new Array(12).fill(0)); ++y; score += rc * 10; rc *= 2; cleared = true;
    }
    if (cleared) { playSound('score'); triggerVibrate(50); }
}
function rotateMatrix(matrix) {
    for (let y = 0; y < matrix.length; ++y) { for (let x = 0; x < y; ++x) { [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]]; } }
    matrix.forEach(row => row.reverse());
}

function spawnApple() {
    apple.x = Math.floor(Math.random() * 12); apple.y = Math.floor(Math.random() * 20);
    if (snake.some(c => c.x === apple.x && c.y === apple.y)) spawnApple();
}
function updateSnake() {
    snakeDir = snakeNextDir; const head = { x: snake[0].x + snakeDir.x, y: snake[0].y + snakeDir.y };
    if (head.x < 0 || head.x >= 12 || head.y < 0 || head.y >= 20 || snake.some(c => c.x === head.x && c.y === head.y)) { triggerGameOver(); return; }
    snake.unshift(head);
    if (head.x === apple.x && head.y === apple.y) { score += 10; updateScoresDisplay(); spawnApple(); playSound('score'); triggerVibrate(25); } else { snake.pop(); }
}

function updatePong() {
    let speedMultiplier = 1 + (score * 0.02);
    pongBall.x += pongBall.vx * speedMultiplier; pongBall.y += pongBall.vy * speedMultiplier;
    if (pongBall.x - pongBall.radius < 0 || pongBall.x + pongBall.radius > 12) { pongBall.vx *= -1; playSound('click'); }
    if (pongBall.y - pongBall.radius < 0) { pongBall.vy *= -1; playSound('click'); }
    if (pongBall.y + pongBall.radius >= pongPaddle.y && pongBall.x >= pongPaddle.x && pongBall.x <= pongPaddle.x + pongPaddle.width) {
        pongBall.vy = -Math.abs(pongBall.vy); score += 5; updateScoresDisplay(); playSound('score'); triggerVibrate(20);
        pongBall.vx += (Math.random() - 0.5) * 0.05;
    }
    if (pongBall.y > 20) triggerGameOver();
}

function updateBrick() {
    let speedMultiplier = 1 + (score * 0.005);
    brickBall.x += brickBall.vx * speedMultiplier; brickBall.y += brickBall.vy * speedMultiplier;
    if (brickBall.x < 0 || brickBall.x > 12) { brickBall.vx *= -1; playSound('click'); }
    if (brickBall.y < 0) { brickBall.vy *= -1; playSound('click'); }
    if (brickBall.y >= brickPaddle.y && brickBall.x >= brickPaddle.x && brickBall.x <= brickPaddle.x + brickPaddle.width) { brickBall.vy = -Math.abs(brickBall.vy); playSound('click'); triggerVibrate(15); }
    bricks.forEach(b => {
        if (b.status === 1 && brickBall.x >= b.x && brickBall.x <= b.x + 2 && brickBall.y >= b.y && brickBall.y <= b.y + 1) {
            b.status = 0; brickBall.vy *= -1; score += 10; updateScoresDisplay(); playSound('score'); triggerVibrate(25);
        }
    });
    if (brickBall.y > 20) triggerGameOver();
    if (bricks.every(b => b.status === 0)) triggerGameOver((i18n[currentLang] || i18n.uk).victory);
}

function checkTTTWin(b) {
    const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for (let l of lines) { if (b[l[0]] && b[l[0]] === b[l[1]] && b[l[0]] === b[l[2]]) return b[l[0]]; }
    return b.every(c => c !== '') ? 'Draw' : null;
}
function aiMove() {
    let empty = tttBoard.map((c, i) => c === '' ? i : null).filter(v => v !== null);
    if (empty.length > 0 && isPlaying) {
        tttBoard[empty[Math.floor(Math.random() * empty.length)]] = 'O'; playSound('click');
        let win = checkTTTWin(tttBoard);
        const lang = i18n[currentLang] || i18n.uk;
        if (win) triggerGameOver(win === 'Draw' ? lang.draw : lang.cpuWins); else tttTurn = 'X';
    }
}

canvas.addEventListener('pointerdown', event => {
    if (currentGame !== 'ttt' || !isPlaying) return;
    initAudio();
    const r = canvas.getBoundingClientRect(); const mx = (event.clientX - r.left) / (r.width / 12); const my = (event.clientY - r.top) / (r.height / 20);
    if (mx >= 1 && mx <= 11 && my >= 4 && my <= 14 && tttTurn === 'X') {
        let idx = Math.floor((my - 4) / 3.3) * 3 + Math.floor((mx - 1) / 3.3);
        if (idx >= 0 && idx < 9 && tttBoard[idx] === '') {
            tttBoard[idx] = 'X'; score++; playSound('score'); let win = checkTTTWin(tttBoard);
            const lang = i18n[currentLang] || i18n.uk;
            if (win) triggerGameOver(win === 'Draw' ? lang.draw : lang.youWin); else { tttTurn = 'O'; setTimeout(aiMove, 300); }
        }
    }
});

function updateInvaders(deltaTime) {
    for (let i = invaderBullets.length - 1; i >= 0; i--) {
        invaderBullets[i].y -= 0.4; if (invaderBullets[i].y < 0) invaderBullets.splice(i, 1);
    }
    invaderMoveTimer += deltaTime;
    let speed = Math.max(100, 500 - (score * 10)); 
    if (invaderMoveTimer > speed) {
        let shiftDown = false;
        invaderEnemies.forEach(e => { if (e.alive) { let nextX = e.x + invaderDir * 0.5; if (nextX > 11.2 || nextX < 0.2) shiftDown = true; } });
        if (shiftDown) {
            invaderDir *= -1;
            invaderEnemies.forEach(e => { if (e.alive) { e.y += 1; if (e.y >= 18) triggerGameOver(); } });
        } else {
            invaderEnemies.forEach(e => { if (e.alive) e.x += invaderDir * 0.5; });
        }
        invaderMoveTimer = 0;
    }
    for (let bIdx = invaderBullets.length - 1; bIdx >= 0; bIdx--) {
        let b = invaderBullets[bIdx]; let hit = false;
        for (let e of invaderEnemies) {
            if (e.alive && b.x >= e.x && b.x <= e.x + 1 && b.y >= e.y && b.y <= e.y + 0.8) {
                e.alive = false; score += 10; updateScoresDisplay(); playSound('click'); triggerVibrate(20); hit = true; break;
            }
        }
        if (hit) invaderBullets.splice(bIdx, 1);
    }
    if (invaderEnemies.every(e => !e.alive)) triggerGameOver((i18n[currentLang] || i18n.uk).victory);
}

function draw() {
    context.fillStyle = '#9ca082'; context.fillRect(0, 0, 12, 20);
    context.fillStyle = '#2b3033'; 

    if (currentGame === 'tetris') {
        arena.forEach((r, y) => r.forEach((v, x) => { if(v) { context.fillRect(x,y,0.95,0.95); } }));
        if (player.matrix) player.matrix.forEach((r, y) => r.forEach((v, x) => { if(v) { context.fillRect(x+player.pos.x, y+player.pos.y,0.95,0.95); } }));
    } else if (currentGame === 'snake') {
        context.fillRect(apple.x, apple.y, 0.9, 0.9);
        snake.forEach(c => context.fillRect(c.x, c.y, 0.95, 0.95));
    } else if (currentGame === 'pong') {
        context.fillRect(pongPaddle.x, pongPaddle.y, pongPaddle.width, pongPaddle.height);
        context.beginPath(); context.arc(pongBall.x, pongBall.y, pongBall.radius, 0, Math.PI*2); context.fill();
    } else if (currentGame === 'brick') {
        context.fillRect(brickPaddle.x, brickPaddle.y, brickPaddle.width, brickPaddle.height);
        context.fillRect(brickBall.x, brickBall.y, 0.5, 0.5);
        bricks.forEach(b => { if(b.status===1){ context.fillRect(b.x, b.y, 1.8, 0.7); } });
    } else if (currentGame === 'ttt') { drawTTT(); }
    else if (currentGame === 'invaders') {
        context.fillRect(invaderPlayerX, 18.5, 1, 0.8);
        invaderBullets.forEach(b => context.fillRect(b.x, b.y, 0.2, 0.5));
        invaderEnemies.forEach(e => { if (e.alive) { context.fillRect(e.x, e.y, 0.8, 0.6); } });
    }
}

function drawTTT() {
    context.strokeStyle = '#2b3033'; context.lineWidth = 0.1;
    for(let i=1; i<3; i++) {
        context.beginPath(); context.moveTo(1 + i*3.3, 4); context.lineTo(1 + i*3.3, 14); context.stroke();
        context.beginPath(); context.moveTo(1, 4 + i*3.3); context.lineTo(11, 4 + i*3.3); context.stroke();
    }
    tttBoard.forEach((cell, i) => {
        let cx = 1 + (i % 3) * 3.3 + 1.65; let cy = 4 + Math.floor(i / 3) * 3.3 + 1.65;
        context.font = "bold 2.5px monospace"; context.textAlign = "center"; context.textBaseline = "middle";
        context.fillStyle = '#2b3033';
        if(cell === 'X' || cell === 'O') { context.fillText(cell, cx, cy); }
    });
}

function update(time = 0) {
    const deltaTime = time - lastTime; lastTime = time;
    if (isPlaying && !isPaused) {
        bgmTimer += deltaTime;
        let bgmTempo = Math.max(180, 350 - (score * 2)); 
        if (bgmTimer > bgmTempo) { playSound('bgm', bgmNotes[bgmStep % bgmNotes.length]); bgmStep++; bgmTimer = 0; }

        if (currentGame === 'tetris') {
            tetrisDropCounter += deltaTime;
            let dynamicTetrisSpeed = Math.max(130, 750 - Math.floor(score / 50) * 100);
            if (tetrisDropCounter > dynamicTetrisSpeed) playerDrop();
        } else if (currentGame === 'snake') {
            snakeTimer += deltaTime;
            let dynamicSnakeSpeed = Math.max(50, 140 - Math.floor(score / 40) * 20);
            if (snakeTimer > dynamicSnakeSpeed) { updateSnake(); snakeTimer = 0; }
        } else if (currentGame === 'pong') { updatePong(); }
        else if (currentGame === 'brick') { updateBrick(); }
        else if (currentGame === 'invaders') { updateInvaders(deltaTime); }
        draw();
    }
    requestAnimationFrame(update);
}

const bindDynamicTouch = (elementId, handler) => {
    const el = document.getElementById(elementId); if(!el) return;
    el.addEventListener('touchstart', (e) => { e.preventDefault(); initAudio(); handler(); }, { passive: false });
    el.addEventListener('mousedown', (e) => { if (e.button === 0) { initAudio(); handler(); } });
};

bindDynamicTouch('btn-dir-left', () => pressDpad('left'));
bindDynamicTouch('btn-dir-right', () => pressDpad('right'));
bindDynamicTouch('btn-dir-up', () => pressDpad('up'));
bindDynamicTouch('btn-dir-down', () => pressDpad('down'));
bindDynamicTouch('btn-action-a', () => pressAction('A'));
bindDynamicTouch('btn-action-b', () => pressAction('B'));

document.addEventListener('keydown', event => {
    const k = event.keyCode;
    if ([32, 37, 38, 39, 40].includes(k) && isPlaying) { event.preventDefault(); }
    if (k === 13 || k === 27) { togglePause(); return; } 
    if (!isPlaying || isPaused) return;
    if (k === 37) pressDpad('left'); if (k === 39) pressDpad('right');
    if (k === 38) pressDpad('up'); if (k === 40) pressDpad('down');
    if (k === 90 || k === 32) pressAction('A'); 
    if (k === 88) pressAction('B'); 
});

// СТАРТ СИСТЕМI
try { updateUIStrings(); update(); } catch(e) { console.error(e); }
</script>
