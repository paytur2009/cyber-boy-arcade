<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Paytur Arcade OS v4.1</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0b0f14;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* СТАРТОВИЙ ВХІД */
        #welcome-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0f1319;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .boot-box {
            width: 100%;
            max-width: 340px;
            background: #182029;
            border: 1px solid #2d3846;
            padding: 25px 20px;
            border-radius: 12px;
            text-align: center;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .boot-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #38b6ff;
            letter-spacing: 1px;
        }

        .boot-field {
            margin-bottom: 18px;
            text-align: left;
        }

        .boot-field label {
            display: block;
            font-size: 12px;
            color: #8a99ad;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .boot-input {
            width: 100%;
            padding: 12px;
            background: #0f1319;
            border: 1px solid #384656;
            color: #fff;
            font-size: 15px;
            text-align: center;
            border-radius: 6px;
            box-sizing: border-box;
            outline: none;
        }

        .device-selector {
            display: flex;
            gap: 10px;
        }

        .device-btn {
            flex: 1;
            padding: 12px;
            font-size: 12px;
            font-weight: bold;
            background: #222c38;
            color: #8a99ad;
            border: 1px solid #384656;
            border-radius: 6px;
            cursor: pointer;
        }

        .device-btn.selected {
            background: #38b6ff;
            color: #000;
            border-color: #38b6ff;
        }

        .launch-btn {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            background: #38b6ff;
            color: #000;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }

        /* ГОЛОВНИЙ МОБІЛЬНИЙ КОНТЕЙНЕР */
        .arcade-layout {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            max-width: 420px;
            background: #141a22;
            box-sizing: border-box;
            padding: env(safe-area-inset-top, 10px) 15px env(safe-area-inset-bottom, 10px) 15px;
            justify-content: space-between;
        }

        /* ВЕРХНЯ ПАНЕЛЬ */
        .top-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5px;
        }

        .stat-block {
            text-align: left;
        }

        .stat-label {
            font-size: 11px;
            color: #8a99ad;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 800;
            color: #ffffff;
        }

        /* ІГРОВА ЗОНА */
        .game-main-zone {
            display: flex;
            flex: 1;
            gap: 12px;
            align-items: stretch;
            min-height: 0;
            margin-bottom: 12px;
        }

        /* РАМКА ІГРОВОГО ПОЛЯ + CRT ФІЛЬТР */
        .playfield-frame {
            flex: 1.3;
            background: #090d12;
            border: 3px solid #2575fc;
            border-radius: 6px;
            position: relative;
            overflow: hidden;
            transition: transform 0.05s ease;
        }

        /* ЕФЕКТ СТАРОГО ТЕЛЕВІЗОРА (CRT) */
        .playfield-frame.crt-mode::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            z-index: 10;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }
        
        .playfield-frame.crt-mode canvas {
            filter: contrast(1.2) brightness(1.1) saturate(1.1);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
        }

        /* БІЧНА ПАНЕЛЬ */
        .game-sidebar {
            flex: 0.7;
            display: flex;
            flex-direction: column;
            gap: 12px;
            font-size: 12px;
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .sidebar-title {
            font-size: 10px;
            font-weight: bold;
            color: #8a99ad;
            letter-spacing: 0.5px;
        }

        .preview-box {
            width: 65px;
            height: 55px;
            background: #10151c;
            border: 1px solid #2d3846;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-counter-num {
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
        }

        /* КНОПКИ КЕРУВАННЯ ВНИЗУ */
        .bottom-controls-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            padding-bottom: 10px;
        }

        .flat-ctrl-btn {
            background: #1f2732;
            border: 1px solid #344356;
            border-radius: 8px;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #ffffff;
            cursor: pointer;
            font-weight: bold;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        .flat-ctrl-btn:active {
            background: #2b3746;
            border-color: #38b6ff;
        }

        /* МЕНЮ ТА ОВЕРЛЕЇ */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(9, 13, 18, 0.98);
            display: flex; flex-direction: column;
            align-items: center; justify-content: flex-start;
            padding: 15px; box-sizing: border-box; z-index: 5;
            overflow-y: auto;
        }
        .hidden { display: none !important; }

        .menu-title {
            font-size: 13px; font-weight: bold; margin-bottom: 8px;
            text-transform: uppercase; color: #38b6ff; letter-spacing: 1px;
        }

        /* КАРТКА ПРЕВ'Ю */
        .menu-preview-card {
            width: 100%;
            background: #171f2a;
            border: 1px solid #2d3b4d;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            gap: 12px;
            align-items: center;
            box-sizing: border-box;
            margin-bottom: 12px;
        }

        .menu-preview-canvas-box {
            width: 60px;
            height: 60px;
            background: #0b0f14;
            border: 1px solid #38b6ff;
            border-radius: 6px;
            overflow: hidden;
        }

        .menu-preview-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .menu-preview-name {
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
            text-transform: uppercase;
        }

        .menu-preview-record {
            font-size: 11px;
            color: #8a99ad;
            margin-top: 2px;
        }

        .menu-preview-record span {
            color: #ff9933;
            font-weight: bold;
            font-size: 14px;
        }

        /* СІТКА ВИБОРУ ІГОР */
        .menu-games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            width: 100%;
            margin-bottom: 12px;
        }

        .game-select-btn {
            padding: 12px 4px;
            font-size: 11px;
            font-weight: bold;
            color: #8a99ad;
            background: #141a22;
            border: 1px solid #253141;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .game-select-btn.active-selection {
            background: #1e2936;
            border-color: #38b6ff;
            color: #38b6ff;
            box-shadow: 0 0 8px rgba(56, 182, 255, 0.2);
        }

        /* ВЕЛИКА КНОПКА ЗАПУСКУ */
        .big-play-btn {
            width: 100%;
            padding: 12px;
            font-size: 13px;
            font-weight: bold;
            background: #2575fc;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .mini-btn { font-size: 12px; padding: 5px 10px; background: #1e2631; color: #fff; border: 1px solid #344356; border-radius: 4px; cursor: pointer;}
        .mini-btn.active { background: #38b6ff; color: #000; }
        .menu-btn {
            padding: 12px; font-size: 13px; font-weight: bold;
            color: #fff; background: #1e2631; border: 1px solid #344356; border-radius: 6px;
            cursor: pointer; width: 90%; margin-bottom: 8px; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="boot-box">
            <div class="boot-title" id="boot-title-text">PAYTUR ARCADE OS v4.1</div>
            
            <div class="boot-field" style="text-align: center; margin-bottom: 15px;">
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button class="mini-btn" id="boot-lang-uk" onclick="changeLanguage('uk')">UA</button>
                    <button class="mini-btn" id="boot-lang-en" onclick="changeLanguage('en')">EN</button>
                </div>
            </div>

            <div class="boot-field">
                <label id="boot-lbl-nick">НІКНЕЙМ ГРАВЦЯ:</label>
                <input type="text" id="boot-username" class="boot-input" maxlength="10" value="MR.PAYTUR">
            </div>

            <div class="boot-field">
                <label id="boot-lbl-device">ТИП КЕРУВАННЯ:</label>
                <div class="device-selector">
                    <button class="device-btn" id="btn-pc" onclick="selectDevice('pc')">КЛАВІАТУРА</button>
                    <button class="device-btn" id="btn-mobile" onclick="selectDevice('mobile')">СЕНСОР</button>
                </div>
            </div>

            <button class="launch-btn" id="btn-launch-text" onclick="launchConsole()">START SYSTEM</button>
        </div>
    </div>

    <div class="arcade-layout">
        
        <div class="top-navbar">
            <div class="stat-block">
                <div class="stat-label">SCORE</div>
                <div id="score" class="stat-value">0</div>
            </div>
            <div class="stat-block" style="text-align: center;">
                <div class="stat-label" id="current-game-name">ARCADE OS</div>
            </div>
            <div class="stat-block" style="text-align: right;">
                <div class="stat-label">TOP</div>
                <div id="best-score" class="stat-value">0</div>
            </div>
        </div>

        <div class="game-main-zone">
            
            <div class="playfield-frame crt-mode" id="screenFrame">
                <canvas id="gameCanvas" width="240" height="400"></canvas>

                <div id="start-menu" class="overlay">
                    <div style="display: flex; gap: 8px; margin-bottom: 10px; width: 100%; justify-content: center;">
                        <button class="mini-btn" id="lang-uk" onclick="changeLanguage('uk')">UA</button>
                        <button class="mini-btn" id="lang-en" onclick="changeLanguage('en')">EN</button>
                        <button class="mini-btn" id="btn-crt" onclick="toggleCRT()">📺 CRT</button>
                        <button class="mini-btn" id="btn-mute" onclick="toggleMute()">🔊</button>
                    </div>

                    <div class="menu-title" id="tx-select-module">ОБЕРІТЬ ГРУ</div>
                    <div id="user-display-tag" style="font-size: 11px; margin-bottom: 10px; color: #8a99ad;"></div>

                    <div class="menu-preview-card">
                        <div class="menu-preview-canvas-box">
                            <canvas id="menuPreviewCanvas" width="65" height="65" style="width:100%; height:100%;"></canvas>
                        </div>
                        <div class="menu-preview-info">
                            <div id="menu-game-title" class="menu-preview-name">TETRIS</div>
                            <div class="menu-preview-record" id="menu-record-label">BEST: <span id="menu-game-record">0</span></div>
                        </div>
                    </div>

                    <div class="menu-games-grid">
                        <button class="game-select-btn" id="sel-tetris" onclick="selectMenuGame('tetris')">1. Tetris</button>
                        <button class="game-select-btn" id="sel-snake" onclick="selectMenuGame('snake')">2. Snake</button>
                        <button class="game-select-btn" id="sel-pong" onclick="selectMenuGame('pong')">3. Pong</button>
                        <button class="game-select-btn" id="sel-brick" onclick="selectMenuGame('brick')">4. Brick</button>
                        <button class="game-select-btn" id="sel-ttt" onclick="selectMenuGame('ttt')">5. Tic-Tac</button>
                        <button class="game-select-btn" id="sel-invaders" onclick="selectMenuGame('invaders')">6. Space</button>
                    </div>

                    <button class="big-play-btn" id="btn-play-selected" onclick="bootSelectedGame()">ГРАТИ / PLAY</button>
                </div>

                <div id="pause-menu" class="overlay hidden">
                    <div class="menu-title" id="tx-paused">PAUSED</div>
                    <button class="menu-btn" id="tx-resume" onclick="togglePause()">RESUME</button>
                    <button class="menu-btn" onclick="showStartMenu()">QUIT</button>
                </div>

                <div id="game-over-menu" class="overlay hidden">
                    <div class="menu-title" id="over-title">GAME OVER</div>
                    <div id="final-score" style="margin-bottom: 15px; font-size: 14px; font-weight: bold;"></div>
                    <button class="menu-btn" id="tx-again" onclick="restartCurrentGame()">TRY AGAIN</button>
                    <button class="menu-btn" onclick="showStartMenu()">MAIN MENU</button>
                </div>
            </div>

            <div class="game-sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-title">NEXT</div>
                    <div class="preview-box">
                        <canvas id="nextCanvas" width="60" height="50"></canvas>
                    </div>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-counter-item">
                        <div class="sidebar-title">COMBO</div>
                        <div id="stat-combo" class="sidebar-counter-num">×1</div>
                    </div>
                    <div class="sidebar-counter-item">
                        <div class="sidebar-title">LINES</div>
                        <div id="stat-lines" class="sidebar-counter-num">0</div>
                    </div>
                    <div class="sidebar-counter-item">
                        <div class="sidebar-title">LEVEL</div>
                        <div id="stat-level" class="sidebar-counter-num">0</div>
                    </div>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-title">HOLD</div>
                    <div class="preview-box">
                        <canvas id="holdCanvas" width="60" height="50"></canvas>
                    </div>
                </div>
            </div>

        </div>

        <div class="bottom-controls-grid">
            <button class="flat-ctrl-btn" id="btn-rot-ccw">↺</button>
            <button class="flat-ctrl-btn" id="btn-rot-cw">↻</button>
            <button class="flat-ctrl-btn" id="btn-pause-flat">Ⅱ</button>
            <button class="flat-ctrl-btn" id="btn-move-left">◀</button>
            <button class="flat-ctrl-btn" id="btn-move-down">▼</button>
            <button class="flat-ctrl-btn" id="btn-move-right">▶</button>
        </div>

    </div>

<script>
const safeStorage = {
    getItem: function(key) { try { return localStorage.getItem(key); } catch(e) { return null; } },
    setItem: function(key, val) { try { localStorage.setItem(key, val); return true; } catch(e) { return false; } }
};

const i18n = {
    uk: {
        bootTitle: "PAYTUR ARCADE OS v4.1",
        lblNickname: "НІКНЕЙМ ГРАВЦЯ:",
        lblDevice: "ТИП КЕРУВАННЯ:",
        btnPc: "КЛАВІАТУРА",
        btnMobile: "СЕНСОР",
        btnLaunch: "ЗАПУСТИТИ СИСТЕМУ",
        selectModule: "ОБЕРІТЬ ГРУ", userTag: "ГРАВЕЦЬ: ",
        paused: "ПАУЗА", resume: "ПРОДОВЖИТИ", failure: "ГРУ ЗАВЕРШЕНО", again: "ЗНОВУ СТАРТ",
        resultStr: ", РЕЗУЛЬТАТ: ",
        victory: "ПЕРЕМОГА!", draw: "НІЧИЯ!", youWin: "ТИ ВИГРАВ!", cpuWins: "РОБОТ ВИГРАВ!"
    },
    en: {
        bootTitle: "PAYTUR ARCADE OS v4.1",
        lblNickname: "PLAYER NICKNAME:",
        lblDevice: "CONTROL TYPE:",
        btnPc: "KEYBOARD",
        btnMobile: "TOUCH PADS",
        btnLaunch: "START SYSTEM",
        selectModule: "SELECT MODULE", userTag: "PLAYER: ",
        paused: "PAUSED", resume: "RESUME", failure: "GAME OVER", again: "TRY AGAIN",
        resultStr: ", SCORE: ",
        victory: "VICTORY!", draw: "DRAW!", youWin: "YOU WIN!", cpuWins: "CPU WINS!"
    }
};

let currentLang = safeStorage.getItem('arcade_lang') || 'uk';
let isMuted = safeStorage.getItem('arcade_muted') === 'true';
let isCRT = safeStorage.getItem('arcade_crt') !== 'false'; 
let selectedDeviceType = 'pc';
let selectedMenuGame = 'tetris';

const canvas = document.getElementById('gameCanvas');
const context = canvas.getContext('2d');
context.scale(20, 20);

const nextCanvas = document.getElementById('nextCanvas');
const nextCtx = nextCanvas.getContext('2d');
const holdCanvas = document.getElementById('holdCanvas');
const holdCtx = holdCanvas.getContext('2d');
const menuPreviewCanvas = document.getElementById('menuPreviewCanvas');
const menuPreviewCtx = menuPreviewCanvas.getContext('2d');

const startMenu = document.getElementById('start-menu');
const pauseMenu = document.getElementById('pause-menu');
const gameOverMenu = document.getElementById('game-over-menu');
const finalScoreText = document.getElementById('final-score');
const currentGameNameLabel = document.getElementById('current-game-name');
const bootUsernameInput = document.getElementById('boot-username');
const userDisplayTag = document.getElementById('user-display-tag');
const muteBtn = document.getElementById('btn-mute');
const crtBtn = document.getElementById('btn-crt');
const screenFrame = document.getElementById('screenFrame');

let currentGame = ''; let isPaused = false; let isPlaying = false; let score = 0; let lastTime = 0;
let linesClearedTotal = 0; let currentLevel = 0; let comboMultiplier = 1;
let currentPlayerName = "MR.PAYTUR";

let particles = [];
let shakeTimer = 0;

function spawnParticles(x, y, color, count = 12) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x: x + Math.random(),
            y: y + Math.random(),
            vx: (Math.random() - 0.5) * 0.25,
            vy: (Math.random() - 0.5) * 0.25,
            alpha: 1,
            color: color
        });
    }
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx; p.y += p.vy; p.alpha -= 0.04;
        if (p.alpha <= 0) particles.splice(i, 1);
    }
}

function drawParticles() {
    particles.forEach(p => {
        context.fillStyle = p.color;
        context.globalAlpha = p.alpha;
        context.fillRect(p.x, p.y, 0.18, 0.18);
    });
    context.globalAlpha = 1;
}

function triggerScreenShake(durationMs = 150) {
    shakeTimer = durationMs;
}

function handleScreenShakeEffect(dt) {
    if (shakeTimer > 0) {
        shakeTimer -= dt;
        const intensity = 3;
        const dx = (Math.random() - 0.5) * intensity;
        const dy = (Math.random() - 0.5) * intensity;
        screenFrame.style.transform = `translate(${dx}px, ${dy}px)`;
    } else {
        screenFrame.style.transform = 'translate(0, 0)';
    }
}

let bgmTimer = 0, bgmStep = 0;
const bgmNotes = [115, 130, 145, 130, 115, 160, 145, 160];

let arena = Array.from({length: 20}, () => new Array(12).fill(0));
let player = { pos: {x: 0, y: 0}, matrix: null };
let nextPieceMatrix = null;

let snake = [], snakeDir = { x: 0, y: -1 }, snakeNextDir = { x: 0, y: -1 };
let apple = { x: 0, y: 0 }, tetrisDropCounter = 0, snakeTimer = 0;
let pongPaddle = { x: 4, y: 19, width: 4, height: 0.8 }, pongBall = { x: 6, y: 10, vx: 0.1, vy: 0.15, radius: 0.4 };
let brickPaddle = { x: 4, y: 19, width: 4, height: 0.8 }, brickBall = { x: 6, y: 15, vx: 0.08, vy: -0.12 }, bricks = [];
let tttBoard = new Array(9).fill(''), tttTurn = 'X';
let invaderPlayerX = 5, invaderBullets = [], invaderEnemies = [], invaderDir = 1, invaderMoveTimer = 0;

const pieceColors = [null, '#ff3366', '#ff9933', '#33ccff', '#ffff33', '#33cc66', '#b333ff', '#33ffcc'];

function updateUIStrings() {
    const lang = i18n[currentLang] || i18n.uk;
    document.getElementById('boot-title-text').innerText = lang.bootTitle;
    document.getElementById('boot-lbl-nick').innerText = lang.lblNickname;
    document.getElementById('boot-lbl-device').innerText = lang.lblDevice;
    document.getElementById('btn-pc').innerText = lang.btnPc;
    document.getElementById('btn-mobile').innerText = lang.btnMobile;
    document.getElementById('btn-launch-text').innerText = lang.btnLaunch;

    if (!isPlaying) currentGameNameLabel.innerText = "ARCADE OS";
    document.getElementById('tx-select-module').innerText = lang.selectModule;
    userDisplayTag.innerText = lang.userTag + currentPlayerName;
    document.getElementById('tx-paused').innerText = lang.paused;
    document.getElementById('tx-resume').innerText = lang.resume;
    document.getElementById('tx-again').innerText = lang.again;

    document.getElementById('btn-pc').classList.toggle('selected', selectedDeviceType === 'pc');
    document.getElementById('btn-mobile').classList.toggle('selected', selectedDeviceType === 'mobile');
    document.getElementById('lang-uk').classList.toggle('active', currentLang === 'uk');
    document.getElementById('lang-en').classList.toggle('active', currentLang === 'en');
    document.getElementById('boot-lang-uk').classList.toggle('active', currentLang === 'uk');
    document.getElementById('boot-lang-en').classList.toggle('active', currentLang === 'en');
    
    muteBtn.innerText = isMuted ? "❌" : "🔊";
    crtBtn.classList.toggle('active', isCRT);
    screenFrame.classList.toggle('crt-mode', isCRT);

let audioCtx = null;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

function playSound(type, freq = null) {
    if (isMuted) return;
    try {
        initAudio(); const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination); const now = audioCtx.currentTime;
        if (type === 'bgm') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(freq, now); gain.gain.setValueAtTime(0.015, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.15); osc.start(now); osc.stop(now + 0.15);
        } else if (type === 'click') {
            osc.type = 'square'; osc.frequency.setValueAtTime(160, now); gain.gain.setValueAtTime(0.03, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.04); osc.start(now); osc.stop(now + 0.04);
        } else if (type === 'score') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(450, now); osc.frequency.setValueAtTime(650, now + 0.05);
            gain.gain.setValueAtTime(0.06, now); gain.gain.linearRampToValueAtTime(0, now + 0.15); osc.start(now); osc.stop(now + 0.15);
        } else if (type === 'gameover') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(110, now); osc.frequency.linearRampToValueAtTime(20, now + 0.5);
            gain.gain.setValueAtTime(0.12, now); gain.gain.linearRampToValueAtTime(0, now + 0.5); osc.start(now); osc.stop(now + 0.5);
        } else if (type === 'boot') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(520, now); osc.frequency.setValueAtTime(1040, now + 0.08);
            gain.gain.setValueAtTime(0.05, now); gain.gain.linearRampToValueAtTime(0, now + 0.25); osc.start(now); osc.stop(now + 0.25);
        }
    } catch(e){}
}

/* КЕРУВАННЯ */
function actionLeft() {
    if (!isPlaying || isPaused) return;
    if (currentGame === 'tetris') { player.pos.x--; if(collide(arena,player)) player.pos.x++; }
    else if (currentGame === 'snake' && snakeDir.x === 0) { snakeNextDir = { x: -1, y: 0 }; }
    else if ((currentGame === 'pong' || currentGame === 'brick') && pongPaddle.x > 0) { pongPaddle.x = Math.max(0, pongPaddle.x - 0.5); brickPaddle.x = pongPaddle.x; }
    else if (currentGame === 'invaders' && invaderPlayerX > 0) { invaderPlayerX--; }
    playSound('click');
}

function actionRight() {
    if (!isPlaying || isPaused) return;
    if (currentGame === 'tetris') { player.pos.x++; if(collide(arena,player)) player.pos.x--; }
    else if (currentGame === 'snake' && snakeDir.x === 0) { snakeNextDir = { x: 1, y: 0 }; }
    else if ((currentGame === 'pong' || currentGame === 'brick') && pongPaddle.x < 12 - pongPaddle.width) { pongPaddle.x = Math.min(12 - pongPaddle.width, pongPaddle.x + 0.5); brickPaddle.x = pongPaddle.x; }
    else if (currentGame === 'invaders' && invaderPlayerX < 11) { invaderPlayerX++; }
    playSound('click');
}

function actionDown() {
    if (!isPlaying || isPaused) return;
    if (currentGame === 'tetris') playerDrop();
    else if (currentGame === 'snake' && snakeDir.y === 0) { snakeNextDir = { x: 0, y: 1 }; playSound('click'); }
}

function actionRotCW() {
    if (!isPlaying || isPaused) return;
    if (currentGame === 'tetris') { 
        rotateMatrix(player.matrix); 
        if(collide(arena,player)) { 
            // Стінний штовхач назад, якщо вперлися
            player.pos.x > 6 ? player.pos.x-- : player.pos.x++;
            if (collide(arena, player)) {
                player.pos.x > 6 ? player.pos.x++ : player.pos.x--;
                rotateMatrix(player.matrix, -1); 
            }
        } else playSound('click'); 
    }
    else if (currentGame === 'invaders') { invaderBullets.push({ x: invaderPlayerX + 0.5, y: 18 }); playSound('score'); }
}

function actionRotCCW() {
    if (!isPlaying || isPaused) return;
    if (currentGame === 'tetris') { 
        rotateMatrix(player.matrix, -1); 
        if(collide(arena,player)) { 
            player.pos.x > 6 ? player.pos.x-- : player.pos.x++;
            if (collide(arena, player)) {
                player.pos.x > 6 ? player.pos.x++ : player.pos.x--;
                rotateMatrix(player.matrix); 
            }
        } else playSound('click'); 
    }
}

/* ЛОГІКА ТЕТРІСА */
function createPiece(t) {
    if (t === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]]; if (t === 'O') return [[4,4],[4,4]];
    if (t === 'L') return [[0,2,0],[0,2,0],[0,2,2]]; if (t === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
    if (t === 'T') return [[0,6,0],[6,6,6],[0,0,0]]; if (t === 'S') return [[0,7,7],[7,7,0],[0,0,0]];
    if (t === 'Z') return [[5,5,0],[0,5,5],[0,0,0]];
}
function collide(a, p) {
    const [m, o] = [p.matrix, p.pos];
    for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < m[y].length; ++x) { if (m[y][x] !== 0 && (a[y + o.y] && a[y + o.y][x + o.x]) !== 0) return true; }
    }
    return false;
}
function playerReset() {
    const pieces = 'ILJOTSZ';
    if (!nextPieceMatrix) { nextPieceMatrix = createPiece(pieces[Math.floor(Math.random()*pieces.length)]); }
    player.matrix = nextPieceMatrix;
    nextPieceMatrix = createPiece(pieces[Math.floor(Math.random()*pieces.length)]);
    player.pos.y = 0; player.pos.x = (6 - player.matrix[0].length / 2 | 0);
    if (collide(arena, player)) { triggerGameOver(); }
    drawMiniPreviews();
}
function playerDrop() {
    player.pos.y++;
    if (collide(arena, player)) {
        player.pos.y--;
        player.matrix.forEach((row, y) => { row.forEach((v, x) => { if (v !== 0) arena[y + player.pos.y][x + player.pos.x] = v; }); });
        playerReset(); tetrisSweep(); updateSidebarStats(); playSound('click');
    }
    tetrisDropCounter = 0;
}
function tetrisSweep() {
    let rowCount = 0;
    outer: for (let y = arena.length - 1; y > 0; --y) {
        for (let x = 0; x < arena[y].length; ++x) { if (arena[y][x] === 0) continue outer; }
        
        for(let x=0; x<12; x++) {
            if(arena[y][x]) spawnParticles(x, y, pieceColors[arena[y][x]] || '#fff', 4);
        }

        arena.splice(y, 1); arena.unshift(new Array(12).fill(0)); ++y;
        rowCount++;
    }
    if (rowCount > 0) {
        linesClearedTotal += rowCount;
        score += rowCount * 15 * comboMultiplier;
        comboMultiplier++;
        currentLevel = Math.floor(linesClearedTotal / 10);
        playSound('score');
        triggerScreenShake(200);
    } else { comboMultiplier = 1; }
}
function rotateMatrix(matrix, dir = 1) {
    for (let y = 0; y < matrix.length; ++y) { for (let x = 0; x < y; ++x) { [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]]; } }
    if (dir > 0) matrix.forEach(row => row.reverse()); else matrix.reverse();
}

/* ІНШІ ІГРИ */
function spawnApple() {
    apple.x = Math.floor(Math.random() * 12); apple.y = Math.floor(Math.random() * 20);
    if (snake.some(c => c.x === apple.x && c.y === apple.y)) spawnApple();
}
function updateSnake() {
    snakeDir = snakeNextDir; const head = { x: snake[0].x + snakeDir.x, y: snake[0].y + snakeDir.y };
    if (head.x < 0 || head.x >= 12 || head.y < 0 || head.y >= 20 || snake.some(c => c.x === head.x && c.y === head.y)) { triggerGameOver(); return; }
    snake.unshift(head);
    if (head.x === apple.x && head.y === apple.y) {
        score += 10; updateSidebarStats();
        spawnParticles(apple.x, apple.y, '#ff3366', 15);
        spawnApple(); playSound('score');
    } else { snake.pop(); }
}
function updatePong() {
    let spd = 1 + (score * 0.02); pongBall.x += pongBall.vx * spd; pongBall.y += pongBall.vy * spd;
    if (pongBall.x < 0 || pongBall.x > 12) { pongBall.vx *= -1; playSound('click'); }
    if (pongBall.y < 0) { pongBall.vy *= -1; playSound('click'); }
    if (pongBall.y >= pongPaddle.y && pongBall.x >= pongPaddle.x && pongBall.x <= pongPaddle.x + pongPaddle.width) {
        pongBall.vy = -Math.abs(pongBall.vy); score += 5; updateSidebarStats(); playSound('score');
        spawnParticles(pongBall.x, pongBall.y, '#38b6ff', 8);
    }
    if (pongBall.y > 20) triggerGameOver();
}
function updateBrick() {
    brickBall.x += brickBall.vx; brickBall.y += brickBall.vy;
    if (brickBall.x < 0 || brickBall.x > 12) { brickBall.vx *= -1; playSound('click'); }
    if (brickBall.y < 0) { brickBall.vy *= -1; playSound('click'); }
    if (brickBall.y >= brickPaddle.y && brickBall.x >= brickPaddle.x && brickBall.x <= brickPaddle.x + brickPaddle.width) { brickBall.vy = -Math.abs(brickBall.vy); playSound('click'); }
    bricks.forEach(b => {
        if (b.status === 1 && brickBall.x >= b.x && brickBall.x <= b.x + 2 && brickBall.y >= b.y && brickBall.y <= b.y + 1) {
            b.status = 0; brickBall.vy *= -1; score += 10; updateSidebarStats(); playSound('score');
            spawnParticles(b.x + 0.5, b.y, b.color || '#ff9933', 12);
        }
    });
    if (brickBall.y > 20) triggerGameOver();
    if (bricks.every(b => b.status === 0)) triggerGameOver((i18n[currentLang] || i18n.uk).victory);
}

canvas.addEventListener('pointerdown', event => {
    if (currentGame !== 'ttt' || !isPlaying) return;
    const r = canvas.getBoundingClientRect(); const mx = (event.clientX - r.left) / (r.width / 12); const my = (event.clientY - r.top) / (r.height / 20);
    if (mx >= 1 && mx <= 11 && my >= 4 && my <= 14 && tttTurn === 'X') {
        let idx = Math.floor((my - 4) / 3.3) * 3 + Math.floor((mx - 1) / 3.3);
        if (idx >= 0 && idx < 9 && tttBoard[idx] === '') {
            tttBoard[idx] = 'X'; playSound('score');
            let win = checkTTTWin(tttBoard);
            const lang = i18n[currentLang] || i18n.uk;
            if (win) triggerGameOver(win === 'Draw' ? lang.draw : lang.youWin); else { tttTurn = 'O'; setTimeout(aiMove, 300); }
        }
    }
});
function checkTTTWin(b) {
    const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for (let l of lines) { if (b[l[0]] && b[l[0]] === b[l[1]] && b[l[0]] === b[l[2]]) return b[l[0]]; }
    return b.every(c => c !== '') ? 'Draw' : null;
}
function aiMove() {
    let empty = tttBoard.map((c, i) => c === '' ? i : null).filter(v => v !== null);
    if (empty.length > 0 && isPlaying) {
        tttBoard[empty[Math.floor(Math.random() * empty.length)]] = 'O'; playSound('click');
        let win = checkTTTWin(tttBoard);
        if (win) triggerGameOver(win === 'Draw' ? i18n[currentLang].draw : i18n[currentLang].cpuWins); else tttTurn = 'X';
    }
}

function updateInvaders(dt) {
    for (let i = invaderBullets.length - 1; i >= 0; i--) { invaderBullets[i].y -= 0.4; if (invaderBullets[i].y < 0) invaderBullets.splice(i, 1); }
    invaderMoveTimer += dt;
    if (invaderMoveTimer > 400) {
        let shiftDown = false;
        invaderEnemies.forEach(e => { if (e.alive) { let nx = e.x + invaderDir * 0.5; if (nx > 11 || nx < 0.5) shiftDown = true; } });
        if (shiftDown) { invaderDir *= -1; invaderEnemies.forEach(e => { if (e.alive) { e.y += 1; if (e.y >= 18) triggerGameOver(); } }); }
        else { invaderEnemies.forEach(e => { if (e.alive) e.x += invaderDir * 0.5; }); }
        invaderMoveTimer = 0;
    }
    for (let bIdx = invaderBullets.length - 1; bIdx >= 0; bIdx--) {
        let b = invaderBullets[bIdx];
        for (let e of invaderEnemies) {
            if (e.alive && b.x >= e.x && b.x <= e.x + 1 && b.y >= e.y && b.y <= e.y + 0.8) { 
                e.alive = false; score += 10; updateSidebarStats(); 
                spawnParticles(e.x, e.y, '#ffff33', 10);
                invaderBullets.splice(bIdx,1); playSound('click'); break; 
            }
        }
    }
    if (invaderEnemies.every(e => !e.alive)) triggerGameOver(i18n[currentLang].victory);
}

function draw() {
    context.fillStyle = '#0a0f14'; context.fillRect(0, 0, 12, 20);
    context.strokeStyle = 'rgba(255, 255, 255, 0.015)'; context.lineWidth = 0.05;
    for (let x = 0; x <= 12; x++) { context.beginPath(); context.moveTo(x, 0); context.lineTo(x, 20); context.stroke(); }
    for (let y = 0; y <= 20; y++) { context.beginPath(); context.moveTo(0, y); context.lineTo(12, y); context.stroke(); }

    if (currentGame === 'tetris') {
        arena.forEach((r, y) => r.forEach((v, x) => { if(v) { context.fillStyle = pieceColors[v] || '#38b6ff'; context.fillRect(x,y,0.92,0.92); } }));
        if (player.matrix) player.matrix.forEach((r, y) => r.forEach((v, x) => { if(v) { context.fillStyle = pieceColors[v] || '#38b6ff'; context.fillRect(x+player.pos.x, y+player.pos.y, 0.92,0.92); } }));
    } else if (currentGame === 'snake') {
        context.fillStyle = '#ff3366'; context.fillRect(apple.x, apple.y, 0.9, 0.9);
        context.fillStyle = '#33cc66'; snake.forEach(c => context.fillRect(c.x, c.y, 0.92, 0.92));
    } else if (currentGame === 'pong') {
        context.fillStyle = '#38b6ff'; context.fillRect(pongPaddle.x, pongPaddle.y, pongPaddle.width, pongPaddle.height);
        context.fillStyle = '#ffffff'; context.beginPath(); context.arc(pongBall.x, pongBall.y, pongBall.radius, 0, Math.PI*2); context.fill();
    } else if (currentGame === 'brick') {
        context.fillStyle = '#38b6ff'; context.fillRect(brickPaddle.x, brickPaddle.y, brickPaddle.width, brickPaddle.height);
        context.fillStyle = '#ffffff'; context.fillRect(brickBall.x, brickBall.y, 0.5, 0.5);
        bricks.forEach(b => { if(b.status===1){ context.fillStyle = b.color; context.fillRect(b.x, b.y, 1.8, 0.7); } });
    } else if (currentGame === 'ttt') {
        context.strokeStyle = '#38b6ff'; context.lineWidth = 0.1;
        for(let i=1; i<3; i++) {
            context.beginPath(); context.moveTo(1 + i*3.3, 4); context.lineTo(1 + i*3.3, 14); context.stroke();
            context.beginPath(); context.moveTo(1, 4 + i*3.3); context.lineTo(11, 4 + i*3.3); context.stroke();
        }
        tttBoard.forEach((cell, i) => {
            let cx = 1 + (i % 3) * 3.3 + 1.65; let cy = 4 + Math.floor(i / 3) * 3.3 + 1.65;
            context.font = "bold 2px sans-serif"; context.textAlign = "center"; context.textBaseline = "middle";
            context.fillStyle = cell === 'X' ? '#38b6ff' : '#ff3366'; if(cell) context.fillText(cell, cx, cy);
        });
    } else if (currentGame === 'invaders') {
        context.fillStyle = '#38b6ff'; context.fillRect(invaderPlayerX, 18.5, 1, 0.8);
        context.fillStyle = '#ff3366'; invaderBullets.forEach(b => context.fillRect(b.x, b.y, 0.2, 0.5));
        context.fillStyle = '#ffff33'; invaderEnemies.forEach(e => { if (e.alive) context.fillRect(e.x, e.y, 0.8, 0.6); });
    }

    drawParticles();
}

function update(time = 0) {
    const deltaTime = time - lastTime; lastTime = time;
    
    handleScreenShakeEffect(deltaTime);
    updateParticles();

    if (isPlaying && !isPaused) {
        bgmTimer += deltaTime;
        if (bgmTimer > 300) { playSound('bgm', bgmNotes[bgmStep % bgmNotes.length]); bgmStep++; bgmTimer = 0; }

        if (currentGame === 'tetris') {
            tetrisDropCounter += deltaTime;
            let currentSpeedMs = Math.max(100, 600 - (currentLevel * 60));
            if (tetrisDropCounter > currentSpeedMs) playerDrop();
        } else if (currentGame === 'snake') {
            snakeTimer += deltaTime; if (snakeTimer > 120) { updateSnake(); snakeTimer = 0; }
        } else if (currentGame === 'pong') updatePong();
        else if (currentGame === 'brick') updateBrick();
        else if (currentGame === 'invaders') updateInvaders(deltaTime);
    }
    
    draw();
    requestAnimationFrame(update);
}

/* КЛАВІАТУРА */
document.addEventListener('keydown', event => {
    const k = event.keyCode;
    if ([32, 37, 38, 39, 40].includes(k) && isPlaying) event.preventDefault();
    if (k === 27) { togglePause(); return; }
    if (!isPlaying || isPaused) return;
    if (k === 37) actionLeft(); if (k === 39) actionRight();
    if (k === 38) actionRotCW(); if (k === 40) actionDown();
    if (k === 32) actionRotCCW();
});

/* ІНТЕЛЕКТУАЛЬНЕ СЕНСОРНЕ КЕРУВАННЯ (З ФІКСОМ ЗАТИСКАННЯ) */
function setupRepeatButton(elementId, actionFn) {
    const el = document.getElementById(elementId);
    if (!el) return;
    let timeoutId = null;
    let intervalId = null;

    const startAction = (e) => {
        e.preventDefault();
        clearInterval(intervalId);
        clearTimeout(timeoutId);
        
        actionFn(); // Миттєве перше спрацювання
        
        // Затримка перед початком безперервного циклу руху (імітація реального затискання)
        timeoutId = setTimeout(() => {
            intervalId = setInterval(actionFn, 65); 
        }, 220);
    };

    const stopAction = (e) => {
        clearTimeout(timeoutId);
        clearInterval(intervalId);
    };

    el.addEventListener('pointerdown', startAction);
    el.addEventListener('pointerup', stopAction);
    el.addEventListener('pointerleave', stopAction);
    el.addEventListener('pointercancel', stopAction);
}

function setupSingleButton(elementId, actionFn) {
    const el = document.getElementById(elementId);
    if (!el) return;
    el.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        actionFn();
    });
}

// Прив'язка кнопок руху (з автоповтором при затисканні)
setupRepeatButton('btn-move-left', actionLeft);
setupRepeatButton('btn-move-right', actionRight);
setupRepeatButton('btn-move-down', actionDown);

// Прив'язка статичних кнопок (одиночне натискання)
setupSingleButton('btn-rot-cw', actionRotCW);
setupSingleButton('btn-rot-ccw', actionRotCCW);
setupSingleButton('btn-pause-flat', togglePause);

document.getElementById('sel-tetris').classList.add('active-selection');
try { updateUIStrings(); update(); } catch(e) { console.error(e); }
</script>
